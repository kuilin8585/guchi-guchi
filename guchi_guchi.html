<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guchi Guchi</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:#0d0a06;
  font-family:'Press Start 2P',monospace;
  display:flex;align-items:center;justify-content:center;
}

/* starfield dots */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 34% 72%, #3a2a0e 0%, transparent 100%),
    radial-gradient(1px 1px at 58% 28%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 76% 55%, #3a2a0e 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 14%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 88%, #3a2a0e 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 44%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 67% 83%, #3a2a0e 0%, transparent 100%),
    radial-gradient(2px 2px at 8%  60%, #2a1e08 0%, transparent 100%),
    radial-gradient(2px 2px at 92% 38%, #2a1e08 0%, transparent 100%);
  pointer-events:none;z-index:0;
}

/* ── MAIN LAYOUT ── */
.ui{
  position:relative;z-index:1;
  display:flex;
  gap:clamp(16px,3vw,48px);
  align-items:center;
  justify-content:center;
  width:100vw;height:100vh;
  padding:24px;
}

/* ── LEFT: Screen panel ── */
.screen-panel{
  display:flex;flex-direction:column;
  align-items:center;
  gap:12px;
}

.screen-bezel{
  background:#1e1408;
  border:3px solid #3a2a0a;
  border-radius:12px;
  padding:10px;
  box-shadow:0 0 0 1px #0a0600, 0 8px 40px rgba(0,0,0,.8), inset 0 1px 3px rgba(255,220,100,.08);
}

.screen{
  background:#8db06b;
  border-radius:4px;
  position:relative;overflow:hidden;
  /* size driven by JS to fill available vh */
}
.screen canvas{
  display:block;
  image-rendering:pixelated;image-rendering:crisp-edges;
}
.msg{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(10,22,4,.93);color:#aadd70;
  font-family:'Press Start 2P',monospace;
  padding:4px 8px 5px;line-height:2;z-index:5;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.screen-label{
  color:#4a3a1e;
  letter-spacing:4px;
  text-transform:uppercase;
}

/* ── RIGHT: Controls panel ── */
.ctrl-panel{
  display:flex;flex-direction:column;
  gap:0;
  min-width:200px;
}

/* icon menu */
.icons-row{
  display:flex;justify-content:space-between;
  background:#141008;
  border:2px solid #2a1e08;
  border-radius:8px 8px 0 0;
  padding:8px 6px 6px;
  border-bottom:none;
}
.ico{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;cursor:pointer;
  padding:4px 6px;
  border-radius:4px;
  transition:background .1s;
}
.ico:hover{background:rgba(255,200,80,.06);}
.ico canvas{image-rendering:pixelated;}
.ico span{color:#4a3a1e;letter-spacing:1px;}
.ico.on{background:rgba(255,200,80,.10);}
.ico.on span{color:#a88040;}

/* stats block */
.stats-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:10px 12px;
  display:flex;flex-direction:column;
  gap:6px;
}
.sr{display:flex;align-items:center;gap:8px;}
.sn{color:#4a3a1e;flex-shrink:0;text-align:right;}
.st{flex:1;background:#1e1408;border-radius:3px;overflow:hidden;border:1px solid #2a1e08;}
.sf{height:100%;background:#6a8a30;border-radius:3px;transition:width .4s;}
.sf.lo{background:#8a2020;}.sf.md{background:#8a6020;}

/* hearts + info */
.meta-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:8px 12px;
  display:flex;flex-direction:column;
  gap:6px;align-items:center;
}
.hearts{display:flex;gap:6px;justify-content:center;}
.hearts canvas{image-rendering:pixelated;}
.info-row{color:#4a3a1e;text-align:center;}

/* evo bar */
.evo-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:6px 12px 8px;
  display:flex;flex-direction:column;gap:4px;
}
.evo-lbl{color:#3a2a0e;text-align:center;}
.evo-track{width:100%;background:#1e1408;border-radius:3px;overflow:hidden;border:1px solid #2a1e08;}
.evo-fill{height:6px;background:#384888;border-radius:3px;transition:width .6s;}

/* selector bars */
.sel-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:8px 12px;
  display:flex;gap:8px;
}
.sel{
  flex:1;background:#1e1408;border-radius:4px;
  border:1px solid #3a2a0a;cursor:pointer;transition:background .1s;
}
.sel:hover{background:#2a1e08;}.sel:active{background:#3a2a10;}

/* action buttons */
.btn-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-radius:0 0 8px 8px;
  padding:12px;
  display:flex;justify-content:space-between;align-items:center;
}
.tb{
  border-radius:50%;
  background:#8a3828;border:2px solid #5a1808;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#ffe8e0;
  font-family:'Press Start 2P',monospace;
  transition:transform .08s,background .08s;
  user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:0 3px 0 #3a0808;
  flex-shrink:0;
}
.tb:hover{background:#a84838;}.tb:active{transform:translateY(2px);box-shadow:0 1px 0 #3a0808;}
.tb.bl{background:#283878;border-color:#081830;box-shadow:0 3px 0 #081828;}
.tb.bl:hover{background:#384898;}.tb.bl:active{transform:translateY(2px);box-shadow:0 1px 0 #081828;}

/* ── SETUP SCREEN (fullscreen overlay) ── */
.setup-overlay{
  position:fixed;inset:0;z-index:100;
  background:#0d0a06;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.setup-box{
  background:#0e0b05;
  border:2px solid #3a2a0a;
  border-radius:12px;
  padding:clamp(16px,3vh,32px) clamp(16px,3vw,32px);
  width:min(520px,96vw);
  display:flex;flex-direction:column;
  gap:clamp(8px,1.5vh,18px);
  align-items:center;
  max-height:96vh;overflow-y:auto;
}
.setup-title{color:#a88040;text-align:center;line-height:1.8;}
.setup-sub{color:#4a3a1e;text-align:center;line-height:2;}
.pet-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.pcard{
  border:1px solid #2a1e08;border-radius:6px;background:#141008;
  padding:8px 4px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:border-color .15s,background .15s;
}
.pcard:hover{border-color:#5a4a18;background:#1e1808;}
.pcard.chosen{border-color:#5878c8;background:#101828;}
.pcard.mush.chosen{border-color:#a838a8;background:#180818;}
.pcard canvas{image-rendering:pixelated;}
.pcard span{color:#6a5a28;text-align:center;line-height:1.7;}
.pcard .badge{padding:1px 4px;border-radius:3px;background:#a838a8;color:#f0b0f0;}
.pcard .badge.shark{background:#283898;color:#b0c8f8;}
.name-sec{display:flex;flex-direction:column;gap:6px;width:100%;}
.name-lbl{color:#6a5a28;}
.name-inp{
  width:100%;padding:8px 10px;
  font-family:'Press Start 2P',monospace;
  background:#0a0806;border:1px solid #3a2a0a;border-radius:5px;
  color:#c8a050;outline:none;
}
.name-inp:focus{border-color:#5878c8;}
.start-btn{
  width:100%;padding:10px;
  font-family:'Press Start 2P',monospace;
  background:#283878;border:1px solid #081838;border-radius:6px;
  color:#c8d8f8;cursor:pointer;transition:background .1s;
  box-shadow:0 3px 0 #081828;
}
.start-btn:hover{background:#384898;}.start-btn:active{background:#1a2858;transform:translateY(2px);box-shadow:0 1px 0 #081828;}
.start-btn:disabled{background:#181818;border-color:#282828;color:#383838;cursor:not-allowed;box-shadow:none;}
.hint{color:#3a2a0e;text-align:center;line-height:2.2;}
</style>
</head>
<body>

<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <div class="setup-title" id="setupTitle">GUCHI GUCHI</div>
    <div class="setup-sub">Choose your pet's destiny</div>
    <div class="pet-grid" id="petGrid"></div>
    <div class="hint">Starts as a mystery egg — evolves into<br>your chosen pet over time</div>
    <div class="name-sec">
      <div class="name-lbl">Pet name</div>
      <input class="name-inp" id="nameInp" maxlength="10" placeholder="PIXEL">
    </div>
    <button class="start-btn" id="startBtn" disabled onclick="startGame()">HATCH!</button>
  </div>
</div>

<div class="ui" id="gameUI" style="display:none">
  <div class="screen-panel">
    <div class="screen-bezel">
      <div class="screen" id="screenWrap">
        <canvas id="gc" width="72" height="55"></canvas>
        <div class="msg" id="msg">...</div>
      </div>
    </div>
    <div class="screen-label" id="screenLabel">GUCHI GUCHI</div>
  </div>

  <div class="ctrl-panel" id="ctrlPanel">
    <div class="icons-row" id="iconsRow"></div>
    <div class="meta-block">
      <div class="hearts" id="hearts"></div>
      <div class="info-row" id="info-row">EGG AGE 0 | 0pt</div>
    </div>
    <div class="stats-block" id="statsBlock"></div>
    <div class="evo-block">
      <div class="evo-lbl">EVOLUTION</div>
      <div class="evo-track"><div class="evo-fill" id="evo-fill" style="width:0%"></div></div>
    </div>
    <div class="sel-block">
      <div class="sel" id="selL" onclick="prevIco()"></div>
      <div class="sel" id="selR" onclick="nextIco()"></div>
    </div>
    <div class="btn-block" id="btnBlock"></div>
  </div>
</div>

<script>
const PETS=[
  {id:'bear',  name:'Sasa',        desc:'Soft & cuddly',   body:'#c8a878',ear:'#b89060',belly:'#e8d0a8',nose:'#906040',dark:'#3a200a',outline:'#5a3a18'},
  {id:'rilak', name:'Rilakkuma',   desc:'Lazy & sweet',    body:'#c8a050',ear:'#b08040',belly:'#f0d890',nose:'#804020',dark:'#3a200a',outline:'#5a3a18'},
  {id:'kockas',name:'Kockásfülű', desc:'Checkered ears',  body:'#4a9a50',ear:'#f0f0f0',belly:'#70c878',nose:'#c03030',dark:'#183818',outline:'#204820'},
  {id:'rabbit',name:'Bao Dutu',    desc:'Sweet & bouncy',  body:'#f8e0e8',ear:'#e0a0b8',belly:'#fff0f4',nose:'#e06080',dark:'#301828',outline:'#503040'},
  {id:'shark', name:'Shasha the Shark', desc:'Bite-sized fins', body:'#4878b8',ear:'#2858a8',belly:'#d8eeff',nose:'#1a3870',dark:'#0a1830',outline:'#1a3870'},
  {id:'mush',  name:'Mush Mash',   desc:'Chaos form!',     body:'#b870c8',ear:'#7840b8',belly:'#f0c8f8',nose:'#c03890',dark:'#281040',outline:'#481868'},
];
const STAGES=['egg','baby','child','teen','adult'];
const STAGE_AGES=[0,5,15,30,50];
const ICONS=['feed','play','bath','sleep','med'];
const MSGS={
  feed:["Yummy!! ♥","Nom nom~","So tasty!","Thank you!"],
  play:["Wheee!! ♥","So fun!","Hehe ♥♥","Yay!!"],
  bath:["Squeaky clean!","Splash! ♥","All fresh~","Bubble bath!"],
  sleep:["Zzz... ♥","Nighty night~","Sweet dreams","Zzz zzz..."],
  med:["Better now! ♥","Yay! Cured!","Cured ♥"],
  hungry:["...hungry...","Feed me~ ;;","Tummy hurts"],
  unhappy:["So bored...","Play with me?","Lonely ;;"],
  dirty:["Eww stinky...","Need a bath!","So grimy ;;"],
  tired:["...sleepy...","Need sleep ;;","Exhausted..."],
  sick:["Not feeling well","Achoo! ;;","Medicine plz"],
  happy:["♥ u ♥","*wiggles*","Yay yay!","Hehe~"],
  idle:["*sniff sniff*","*blinks*","*yawns*","...hmm..."],
  shark:["CHOMP!","*fin wobble*","Blub blub~","BITE SIZE!"],
  mush:["I am... what?","*glitches*","Mush mash!","hehe chaos"],
};
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function lerpc(a,b,t){
  const ca=parseInt(a.slice(1),16),cb=parseInt(b.slice(1),16);
  const r=Math.round(((ca>>16)&255)*(1-t)+((cb>>16)&255)*t);
  const g=Math.round(((ca>>8)&255)*(1-t)+((cb>>8)&255)*t);
  const bl=Math.round((ca&255)*(1-t)+(cb&255)*t);
  return '#'+[r,g,bl].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

let G={hunger:80,happy:80,clean:80,energy:80,age:0,score:0,coins:200,sleeping:false,frame:0,eyeOpen:true,particles:[],dead:false,hearts:3,ticks:0,sick:false,sickTimer:0,action:null,actionF:0,selIcon:0,petId:null,petName:'',pet:null,stage:'egg',mushParts:null,started:false,feedAnim:null,playAnim:null,bathAnim:null,medAnim:null};

function getStage(){for(let i=STAGE_AGES.length-1;i>=0;i--)if(G.age>=STAGE_AGES[i])return STAGES[i];return 'egg';}
function stageIdx(){return STAGES.indexOf(getStage());}
function evolT(){const si=stageIdx();const na=STAGE_AGES[si+1]||STAGE_AGES[si]+20;const pa=STAGE_AGES[si];return Math.min(1,(si+Math.min(1,(G.age-pa)/Math.max(1,na-pa)))/4);}
function getCols(t){if(!G.pet)return{body:'#d4b896',ear:'#c09878',belly:'#ece0c8',nose:'#907050',dark:'#2a1a04',outline:'#4a3a1e'};const p=G.pet,base={body:'#d4c8a0',ear:'#c0a880',belly:'#ece0c8',nose:'#907050'};return{body:lerpc(base.body,p.body,t),ear:lerpc(base.ear,p.ear,t),belly:lerpc(base.belly,p.belly,t),nose:lerpc(base.nose,p.nose,t),dark:p.dark,outline:p.outline,t};}

let gc,gx;
function px(x,y,c){if(x<0||x>=72||y<0||y>=55)return;gx.fillStyle=c;gx.fillRect(x,y,1,1);}
function rect(x,y,w,h,c){gx.fillStyle=c;gx.fillRect(x,y,w,h);}
function clr(){gx.fillStyle='#8db06b';gx.fillRect(0,0,72,55);}

function drawEgg(cx,cy){const bob=Math.floor(G.frame/10)%2?-1:0,c=getCols(0);rect(cx-4,cy-8+bob,9,11,c.outline);rect(cx-3,cy-7+bob,7,9,c.body);rect(cx-4,cy-4+bob,1,4,c.body);rect(cx+3,cy-4+bob,1,4,c.body);if(G.eyeOpen){rect(cx-2,cy-5+bob,2,2,c.dark);rect(cx+1,cy-5+bob,2,2,c.dark);}else{rect(cx-2,cy-5+bob,2,1,c.dark);rect(cx+1,cy-5+bob,2,1,c.dark);}px(cx,cy-4+bob,c.dark);if(Math.floor(G.frame/18)%3===1){px(cx-3,cy-9+bob,c.body);px(cx+2,cy-9+bob,c.body);}}
function drawEars(cx,by,pid,c,ea){if(pid==='shark'){rect(cx-1,by-14+ea,3,8,'#1a3870');rect(cx,by-13+ea,1,6,c.body);px(cx-2,by-9+ea,'#1a3870');px(cx+2,by-9+ea,'#1a3870');}else if(pid==='kockas'){
  // Left ear outline
  rect(cx-5,by-15+ea,3,9,c.dark);
  // Right ear outline
  rect(cx+2,by-15+ea,3,9,c.dark);
  // Left ear checkered fill (alternating white/#181818 per row)
  const chk=['#f0f0f0','#181818'];
  for(let row=0;row<7;row++){rect(cx-4,by-14+ea+row,1,1,chk[row%2]);rect(cx-3,by-14+ea+row,1,1,chk[(row+1)%2]);}
  // Right ear checkered fill
  for(let row=0;row<7;row++){rect(cx+2,by-14+ea+row,1,1,chk[row%2]);rect(cx+3,by-14+ea+row,1,1,chk[(row+1)%2]);}
}else if(pid==='rabbit'){rect(cx-5,by-17+ea,3,10,c.outline);rect(cx+2,by-17+ea,3,10,c.outline);rect(cx-4,by-16+ea,2,8,c.ear);rect(cx+2,by-16+ea,2,8,c.ear);}else if(pid==='rilak'){rect(cx-5,by-10+ea,5,5,c.outline);rect(cx+0,by-10+ea,5,5,c.outline);rect(cx-4,by-9+ea,4,4,c.ear);rect(cx+0,by-9+ea,4,4,c.ear);rect(cx-3,by-9+ea,2,2,c.dark);rect(cx+1,by-9+ea,2,2,c.dark);}else{rect(cx-5,by-10+ea,4,5,c.outline);rect(cx+1,by-10+ea,4,5,c.outline);rect(cx-4,by-9+ea,3,4,c.ear);rect(cx+1,by-9+ea,3,4,c.ear);}}
function drawFace(cx,by,pid,c,sleeping,mood){if(!sleeping&&G.eyeOpen){if(pid==='shark'){rect(cx-3,by-4,2,2,c.dark);rect(cx+1,by-4,2,2,c.dark);px(cx-3,by-3,c.belly);px(cx+2,by-3,c.belly);}else if(mood==='happy'){rect(cx-3,by-4,2,1,c.dark);rect(cx+1,by-4,2,1,c.dark);px(cx-4,by-3,c.dark);px(cx+3,by-3,c.dark);}else if(mood==='sad'){rect(cx-3,by-3,2,2,c.dark);rect(cx+1,by-3,2,2,c.dark);px(cx-4,by-4,c.dark);px(cx+3,by-4,c.dark);}else{rect(cx-3,by-4,2,2,c.dark);rect(cx+1,by-4,2,2,c.dark);}}else{rect(cx-3,by-4,3,1,c.dark);rect(cx+0,by-4,3,1,c.dark);}px(cx,by-2,c.nose);if(pid==='shark'){rect(cx-3,by+1,7,2,c.dark);for(let i=0;i<3;i++)px(cx-2+i*2,by+1,c.belly);px(cx-3,by+2,'#1a3870');px(cx+3,by+2,'#1a3870');}else if(mood==='happy'){rect(cx-2,by+1,5,1,c.dark);px(cx-2,by+1,c.body);px(cx+2,by+1,c.body);}else if(mood==='sad'){rect(cx-2,by+2,5,1,c.dark);}else{rect(cx-2,by+1,5,1,c.dark);}}

// ── Per-pet eating animations ──────────────────────────────────────────────
// G.feedAnim = { frame: 0..59, type: petId }  set when feed action fires
function drawFeedAnim(){
  if(!G.feedAnim) return;
  const fa=G.feedAnim, f=fa.frame, pid=fa.type;
  const cx=36, cy=38;

  if(pid==='bear'){
    // Bear holds a big honey jar, licks it, jar shrinks
    const phase=Math.floor(f/10)%3; // 0=offer, 1=lick, 2=happy
    // honey jar (right side)
    const jx=cx+10, jy=cy-8;
    rect(jx,jy,6,8,'#c8780a');
    rect(jx+1,jy-1,4,2,'#e89820');
    rect(jx+1,jy+1,4,5,'#f0b030'); // honey inside
    rect(jx+2,jy+2,2,3,'#f8d060');
    // lid
    rect(jx,jy-2,6,2,'#8a5010');
    // tongue lick on phase 1
    if(phase===1){
      rect(cx+5,cy-3,4,2,'#e06070'); // tongue out
      rect(cx+6,cy-2,3,1,'#e06070');
      // sparkle
      px(jx-1,jy+1,'#f8f800'); px(jx+6,jy,'#f8f800');
    }
    // stars on phase 2
    if(phase===2){
      for(let i=0;i<3;i++){const sx=jx-3+i*4,sy=jy-4;px(sx,sy,'#f8f800');px(sx+1,sy+1,'#f8f800');}
    }
    // paw reaching up toward jar
    rect(cx+4,cy-1,4,2,fa.cols?fa.cols.body:'#c8a878');
    rect(cx+5,cy-2,3,2,fa.cols?fa.cols.belly:'#e8d0a8');
  }

  else if(pid==='rilak'){
    // Rilakkuma has a BIG pile of rice balls (onigiri), lazily munches
    const munch=Math.floor(f/6)%4;
    // rice ball pile
    const food=[{x:cx-14,y:cy-2},{x:cx-10,y:cy-6},{x:cx-6,y:cy-2},{x:cx+8,y:cy-4}];
    food.forEach((fp,i)=>{
      if(i<food.length-(munch>1?1:0)){ // one disappears mid-munch
        rect(fp.x,fp.y,5,5,'#f0f0e0');
        rect(fp.x+1,fp.y+1,3,3,'#ffffff');
        rect(fp.x+1,fp.y,3,2,'#1a1a1a'); // seaweed wrap
        px(fp.x+2,fp.y+3,'#e06060'); // umeboshi dot
      }
    });
    // cheek puff when eating
    if(munch===1||munch===2){
      rect(cx-4,cy-3,3,3,fa.cols?fa.cols.body:'#c8a050');
      rect(cx+2,cy-3,3,3,fa.cols?fa.cols.body:'#c8a050');
    }
    // wide open mouth
    if(munch===0||munch===2){
      rect(cx-2,cy+1,5,2,'#2a1a04');
      rect(cx-1,cy+2,3,1,'#e06060');
    }
    // arm reaching to pile
    rect(cx-8,cy,5,2,fa.cols?fa.cols.body:'#c8a050');
  }

  else if(pid==='kockas'){
    // Kockásfülű nibbles a carrot super fast, ears wiggle
    const nib=Math.floor(f/5)%4;
    const earWiggle=(nib%2)*2-1;
    // carrot
    rect(cx+8,cy-8,3,9,'#e87820');
    rect(cx+9,cy-9,1,10,'#f09030');
    rect(cx+8,cy-10,3,3,'#308020'); // carrot top
    rect(cx+7,cy-11,5,2,'#208010');
    px(cx+9,cy-12,'#308020');
    // bite taken out
    if(nib>=1) rect(cx+8,cy-3,3,2,'#8db06b'); // bg color = bite
    if(nib>=2) rect(cx+8,cy-5,3,2,'#8db06b');
    if(nib>=3) rect(cx+8,cy-7,3,2,'#8db06b');
    // ear wiggle lines
    px(cx-6,cy-16+earWiggle,'#8db06b');
    px(cx+4,cy-16-earWiggle,'#8db06b');
    // chewing cheek puff
    rect(cx+4,cy-3,3,2,fa.cols?fa.cols.body:'#4a9a50');
    // flying carrot bits
    if(nib===3){
      px(cx+6,cy-4,'#e87820');px(cx+5,cy-6,'#f09030');px(cx+7,cy-2,'#e87820');
    }
  }

  else if(pid==='rabbit'){
    // Bao Dutu nibbles a strawberry delicately, tail wags
    const bite=Math.floor(f/8)%4;
    const tailWag=Math.floor(f/4)%2;
    // strawberry
    rect(cx+9,cy-10,5,6,'#d02828');
    rect(cx+10,cy-11,3,2,'#d02828');
    rect(cx+11,cy-12,1,2,'#30a820'); // stem
    // seeds
    px(cx+9,cy-9,'#f8f870');px(cx+11,cy-8,'#f8f870');px(cx+13,cy-10,'#f8f870');
    // highlight
    rect(cx+10,cy-10,2,2,'#f04848');
    // bite progress
    if(bite>=1) rect(cx+9,cy-7,2,2,'#8db06b');
    if(bite>=2) rect(cx+9,cy-8,3,1,'#8db06b');
    // tail wag
    rect(cx-6,cy+3+tailWag,3,2,fa.cols?fa.cols.belly:'#fff0f4');
    px(cx-5,cy+4+tailWag,'#ffffff');
    // dainty paw holding fruit
    rect(cx+6,cy-4,3,2,fa.cols?fa.cols.body:'#f8e0e8');
    // sparkle hearts when happy bite
    if(bite===2||bite===3){
      px(cx+3,cy-12,'#e06080');px(cx+4,cy-13,'#e06080');px(cx+3,cy-13,'#e06080');
      px(cx+16,cy-8,'#e06080');
    }
  }

  else if(pid==='shark'){
    // Shark CHOMPS a whole fish — jaw opens wide, fish disappears
    const chomp=Math.floor(f/7)%5;
    // fish swimming in (phases 0-1), being chomped (2-3), gone (4)
    if(chomp<=1){
      const fx=cx+8+(1-chomp)*10;
      // fish body
      rect(fx,cy-4,8,5,'#50a8d8');
      rect(fx+1,cy-5,6,1,'#50a8d8');
      rect(fx+1,cy,6,1,'#50a8d8');
      // tail
      rect(fx+7,cy-5,3,3,'#3888b8');rect(fx+8,cy-3,3,4,'#3888b8');
      // eye
      px(fx+2,cy-2,'#ffffff');
      // bubbles
      px(fx-2,cy-5,'#8db06b');px(fx-4,cy-3,'#8db06b');
    }
    if(chomp===2){
      // half fish + jaw open wide
      rect(cx+8,cy-4,5,5,'#50a8d8');
      // huge open jaw
      rect(cx-5,cy-2,10,2,'#0a1830'); // upper jaw
      rect(cx-5,cy+2,10,2,'#0a1830'); // lower jaw
      rect(cx-4,cy-1,8,3,'#1a3870'); // throat
      // teeth
      for(let i=0;i<4;i++){px(cx-4+i*2,cy,'#f0f0f0');px(cx-4+i*2,cy-1,'#f0f0f0');}
      // blood splash lol just red pixel
      px(cx+4,cy-6,'#c02020');px(cx+5,cy-4,'#c02020');
    }
    if(chomp===3){
      // jaw snapping closed
      rect(cx-5,cy-1,10,2,'#0a1830');
      for(let i=0;i<4;i++) px(cx-4+i*2,cy-1,'#f0f0f0');
    }
    if(chomp===4){
      // belly bulge after eating
      rect(cx-5,cy-1,11,4,fa.cols?fa.cols.belly:'#d8eeff');
      rect(cx-4,cy,9,2,'#e8f8ff'); // shine
      // satisfied eyes
      rect(cx-3,cy-5,2,1,'#0a1830');rect(cx+1,cy-5,2,1,'#0a1830');
    }
    // bubbles always
    if(Math.floor(f/8)%2===0){
      px(cx-8,cy-8,'#6ab8d8');px(cx-6,cy-10,'#6ab8d8');
    }
  }

  else if(pid==='mush'){
    // Mush Mash eats glitchy rainbow food — fork and spoon, random colour bites
    const mf=Math.floor(f/6)%6;
    // giant fork left
    rect(cx-14,cy-12,2,14,'#888888');
    rect(cx-14,cy-12,1,5,'#aaaaaa');
    rect(cx-13,cy-14,1,3,'#aaaaaa');
    rect(cx-15,cy-14,1,3,'#aaaaaa');
    rect(cx-16,cy-12,1,3,'#aaaaaa');
    // giant spoon right
    rect(cx+12,cy-10,2,12,'#888888');
    rect(cx+11,cy-12,4,5,'#aaaaaa');
    rect(cx+11,cy-14,4,3,'#999999');
    // random colour food blobs flying in
    const glitchCols=['#f870f8','#70f8f8','#f8f870','#f87070','#70f870','#7070f8'];
    for(let i=0;i<4;i++){
      const bx=cx-6+i*4, by2=cy-8+Math.sin((f*0.3+i)*1.5)*3;
      rect(Math.round(bx),Math.round(by2),2,2,glitchCols[(mf+i)%glitchCols.length]);
    }
    // wide open glitchy mouth
    if(mf%2===0){
      rect(cx-3,cy+1,7,3,'#281040');
      rect(cx-2,cy+2,5,1,glitchCols[mf%glitchCols.length]);
    }
    // eye sparkle
    if(mf===2||mf===4){
      px(cx-3,cy-5,'#f8f800');px(cx+2,cy-5,'#f8f800');
    }
  }

  else {
    // egg / default: just a bowl of food appearing
    const bx=cx+8,by2=cy-4;
    rect(bx,by2+2,8,4,'#c09858');
    rect(bx+1,by2+1,6,2,'#d8b070');
    rect(bx+2,by2,4,2,'#f0c880');
    // steam
    if(Math.floor(f/8)%2===0){
      px(bx+2,by2-2,'#d0d8c0');px(bx+5,by2-3,'#d0d8c0');
    }
  }

  fa.frame++;
  if(fa.frame>=60) G.feedAnim=null;
}

// ── MED animation system ──────────────────────────────────────────────────
// G.medAnim = { frame, phase, cols }
// phase: 'offer'→'refuse'→'hide'→'waiting'  (waiting = player must choose)
// After waiting: 'bait'→'cured'  OR  'vet'→'cured'
const VET_COST = 150;
const BAIT_COST = 30;

function drawMedAnim(){
  if(!G.medAnim) return;
  const ma=G.medAnim, f=ma.frame, ph=ma.phase;
  const c=ma.cols;
  const body=c?c.body:'#d4b896', belly=c?c.belly:'#ece0c8';
  const outline=c?c.outline:'#4a3a1e', nose=c?c.nose:'#907050', dk=c?c.dark:'#2a1a04';

  // ── OFFER phase: owner holds out pill, pet looks at it ──
  if(ph==='offer'){
    drawBg();
    // draw pet normally but with curious expression
    drawPet(30,38);
    // pill capsule on right side
    const px2=50, py2=32;
    rect(px2,py2,6,4,'#e04848');   // red half
    rect(px2+3,py2,3,4,'#f0f0f0'); // white half
    rect(px2,py2,6,1,'#c02828');
    // owner hand holding pill (simple)
    rect(px2+1,py2+4,4,4,'#f0c890');
    rect(px2+2,py2+3,2,2,'#e0b880');
    // question mark above pet
    if(Math.floor(f/8)%2===0){
      rect(27,22,2,1,dk);rect(27,23,2,1,dk);rect(26,24,1,1,dk);
      rect(27,25,1,1,dk);rect(27,27,1,1,dk);
    }
    ma.frame++;
    if(ma.frame>30){ma.phase='refuse';ma.frame=0;}
    return;
  }

  // ── REFUSE phase: pet recoils, bitter face, backs away ──
  if(ph==='refuse'){
    drawBg();
    const runX = Math.min(f*3, 36); // pet scoots left
    drawPet(30-runX, 38);
    // bitter face overlay on pet
    const bx=30-runX, by_=36;
    // tongue out / disgust
    rect(bx-2,by_+1,5,1,dk);   // scrunched mouth
    px(bx,by_+2,'#e04060');     // tongue
    px(bx-1,by_+2,'#e04060');
    // squiggly lines = bitter
    if(f%4<2){px(bx+5,by_-3,'#f8d040');px(bx+6,by_-2,'#f8d040');}
    // pill falls / bounces
    const dropY = Math.min(f*2, 20);
    rect(50,32+dropY,6,4,'#e04848');rect(53,32+dropY,3,4,'#f0f0f0');
    if(dropY>=20){px(50,51,'#e04848');px(53,51,'#f0f0f0');} // smashed
    // exclamation
    if(f<15){
      rect(28,18,1,5,dk);rect(28,24,1,1,dk);
    }
    ma.frame++;
    if(ma.frame>36){ma.phase='hide';ma.frame=0;}
    return;
  }

  // ── HIDE phase: pet darts into shadow corner ──
  if(ph==='hide'){
    // dark room
    gx.fillStyle='#050808';gx.fillRect(0,0,144,110);
    // dim floor
    rect(0,48,72,7,'#102010');
    // shadow blob in corner (bottom-left)
    gx.globalAlpha=0.85;
    gx.fillStyle='#000000';
    gx.beginPath();gx.ellipse(14,54,14,6,0,0,Math.PI*2);gx.fill();
    gx.globalAlpha=1;
    // pet partly in shadow — just eyes visible
    const eyeAlpha = Math.max(0, 1-f*0.06);
    const petX = Math.max(6, 30-f*4);
    if(petX>6){
      drawPet(petX, 46);
    } else {
      // fully hidden — just glowing eyes in dark
      gx.globalAlpha=0.7;
      px(8,44,c?c.nose:'#e08080');
      px(11,44,c?c.nose:'#e08080');
      // scared sweat drops
      if(Math.floor(f/6)%2===0){px(6,42,'#60a8e0');px(14,42,'#60a8e0');}
      gx.globalAlpha=1;
    }
    // "..." speech bubble
    if(f>10&&f<30){
      rect(16,38,10,7,'#f0f0e0');rect(16,38,10,1,'#c0c0a0');rect(16,44,10,1,'#c0c0a0');
      px(16,45,'#c0c0a0');px(17,46,'#c0c0a0');
      rect(18,40,2,1,dk);rect(21,40,2,1,dk);rect(24,40,1,1,dk);
    }
    ma.frame++;
    if(ma.frame>45){ma.phase='waiting';ma.frame=0;showMedChoiceUI();}
    return;
  }

  // ── WAITING: keep drawing the hide scene, UI overlay shown in HTML ──
  if(ph==='waiting'){
    gx.fillStyle='#050808';gx.fillRect(0,0,144,110);
    rect(0,48,72,7,'#102010');
    gx.globalAlpha=0.85;gx.fillStyle='#000000';
    gx.beginPath();gx.ellipse(14,54,14,6,0,0,Math.PI*2);gx.fill();
    gx.globalAlpha=1;
    // glowing scared eyes blinking
    if(Math.floor(G.frame/15)%3!==0){
      px(8,44,c?c.nose:'#e08080');px(11,44,c?c.nose:'#e08080');
    }
    if(Math.floor(G.frame/10)%2===0){px(6,42,'#60a8e0');px(14,42,'#60a8e0');}
    return;
  }

  // ── BAIT phase: candy dropped, pet sniffs out, eats it, takes med ──
  if(ph==='bait'){
    if(f<20){
      // drop candy into shadow
      gx.fillStyle='#050808';gx.fillRect(0,0,144,110);rect(0,48,72,7,'#102010');
      gx.globalAlpha=0.85;gx.fillStyle='#000000';gx.beginPath();gx.ellipse(14,54,14,6,0,0,Math.PI*2);gx.fill();gx.globalAlpha=1;
      // candy lolly falling
      const cy2=Math.min(f*2+20,42);
      rect(18,cy2,5,5,'#f84898');rect(19,cy2+1,3,3,'#f870b8');rect(20,cy2,1,1,'#ffffff');
      rect(20,cy2+5,1,5,'#c8a060'); // stick
      // eyes light up
      if(f>10){gx.fillStyle='#f8f840';px(8,44,'#f8f840');px(11,44,'#f8f840');}
    } else {
      // pet creeps out, eats candy, then takes pill happily
      drawBg();
      const comeX = Math.min((f-20)*3, 24);
      drawPet(6+comeX, 38);
      // candy on ground
      if(f<32) rect(18,42,5,5,'#f84898');
      // happy munching after f=32
      if(f>=32 && f<50){
        drawPet(28,38);
        // big happy eyes
        rect(24,34,2,1,dk);rect(28,34,2,1,dk);
        px(23,35,dk);px(30,35,dk);
        // cheek puff
        rect(22,36,3,3,body);rect(29,36,3,3,body);
        // candy wrapper bits
        px(18,38,'#f84898');px(23,40,'#f870b8');
      }
      if(f>=50){
        // pet happily accepts pill now
        drawPet(30,38);
        rect(44,30,6,4,'#e04848');rect(47,30,3,4,'#f0f0f0');
        // pet reaches for it
        rect(36,33,8,2,outline);
        // sparkle
        px(43,28,'#f8f840');px(45,27,'#f8f840');px(47,28,'#f8f840');
      }
    }
    ma.frame++;
    if(ma.frame>75){G.sick=false;G.sickTimer=0;setMsg('Candy first... then medicine ♥');G.medAnim=null;updateBars();drawHearts();}
    return;
  }

  // ── VET phase: vet clinic scene, pet gets injection, cured ──
  if(ph==='vet'){
    // clinic white walls
    gx.fillStyle='#e8f0f8';gx.fillRect(0,0,144,110);
    // clinic details
    rect(0,0,72,2,'#c0d0e0');

function doAction(){
  if(!G.started||G.dead)return;if(G.action)return;
  const type=ICONS[G.selIcon];G.action=type;G.actionF=50;spawnP();
  const isShark=G.petId==='shark',isMush=G.petId==='mush';
  if(type==='feed'){setMsg(isShark?'CHOMP CHOMP!':isMush?rnd(MSGS.mush)+' *eats*':rnd(MSGS.feed));G.hunger=Math.min(100,G.hunger+25);if(G.sleeping)G.sleeping=false;
    const t=evolT(),c=getCols(t);G.feedAnim={frame:0,type:G.petId,cols:c};G.actionF=65;}
  else if(type==='play'){
    const act=PLAY_ACTIVITIES[Math.floor(Math.random()*PLAY_ACTIVITIES.length)];
    setMsg(rnd(PLAY_MSGS[act]));
    G.happy=Math.min(100,G.happy+28);G.energy=Math.max(0,G.energy-10);if(G.sleeping)G.sleeping=false;
    // pick a random friend that isn't the player's pet
    const friends=PETS.filter(p=>p.id!==G.petId);
    const fr=friends[Math.floor(Math.random()*friends.length)];
    const t=evolT(),c=getCols(t);
    G.playAnim={frame:0,activity:act,friend:fr,cols:c,friendCols:fr};
    G.actionF=95;
  }
  else if(type==='bath'){
    if(isShark){setMsg('Already wet...');}
    else if(isMush){setMsg('Mush gets soggy');}
    else{setMsg('Welcome to the spa! ♥');}
    G.clean=Math.min(100,G.clean+35);G.happy=Math.min(100,G.happy+10);if(G.sleeping)G.sleeping=false;
    const t2=evolT(),c2=getCols(t2);
    G.bathAnim={frame:0,cols:c2};
    G.actionF=245;
  }
  else if(type==='sleep'){setMsg(isShark?'Sharks never sleep':isMush?'*glitch sleep*':rnd(MSGS.sleep));G.sleeping=true;G.energy=Math.min(100,G.energy+40);}
  else if(type==='med'){
    if(!G.sick){setMsg('Not sick right now~');return;}
    if(isShark){setMsg('Sharks dont get sick~');G.sick=false;G.sickTimer=0;return;}
    // 55% chance pet refuses (bitter medicine!)
    const refuses = isMush ? Math.random()<0.8 : Math.random()<0.55;
    if(refuses){
      const c3=getCols(evolT());
      G.medAnim={frame:0,phase:'offer',cols:c3};
      G.action='med';G.actionF=999;
      setMsg(rnd(['Eww bitter!!','No no no!!','*runs away*','I HATE medicine!!']));
    } else {
      G.sick=false;G.sickTimer=0;
      setMsg(rnd(MSGS.med));
    }
  }
  G.score+=10;G.coins+=5;updateBars();drawHearts();updateInfo();
}

let lastTick=Date.now(),idleTimer=0;
function loop(){
  G.frame++;
  if(G.frame%20===0)G.eyeOpen=false;
  if(G.frame%20===3)G.eyeOpen=true;
  if(G.action){G.actionF--;if(G.actionF<=0){G.action=null;if(G.medAnim&&G.medAnim.phase==='waiting'){removeMedChoiceUI();G.medAnim=null;}}}
  if(G.started&&!G.dead){
    const now=Date.now();
    if(now-lastTick>3500){
      lastTick=now;G.ticks++;G.age=Math.floor(G.ticks/4);
      const prev=G.stage;G.stage=getStage();
      if(G.stage!==prev){setMsg(G.petName+' is growing!');if(G.petId==='mush')G.mushParts=buildMushParts();}
      if(!G.sleeping){G.hunger=Math.max(0,G.hunger-4);G.happy=Math.max(0,G.happy-3);G.clean=Math.max(0,G.clean-3);G.energy=Math.max(0,G.energy-3);}
      else{G.energy=Math.min(100,G.energy+6);G.hunger=Math.max(0,G.hunger-1);}
      if(!G.sick&&Math.random()<0.06&&G.ticks>3){G.sick=true;G.sickTimer=18;setMsg(rnd(MSGS.sick));}
      if(G.sick){G.sickTimer--;if(G.sickTimer<=0)G.sick=false;}
      const mn=Math.min(G.hunger,G.happy,G.clean,G.energy);
      if(mn<15){G.hearts=Math.max(0,G.hearts-1);if(G.hearts<=0){G.dead=true;setMsg(G.petName+' is gone ;; Refresh!');}
      else setMsg(G.sick?rnd(MSGS.sick):G.hunger===mn?rnd(MSGS.hungry):G.happy===mn?rnd(MSGS.unhappy):G.clean===mn?rnd(MSGS.dirty):rnd(MSGS.tired));}
      updateBars();drawHearts();updateInfo();
    }
    idleTimer++;
    if(idleTimer>150&&!G.action){idleTimer=0;if(Math.random()<0.4)setMsg(G.petId==='shark'?rnd(MSGS.shark):G.petId==='mush'?rnd(MSGS.mush):rnd(MSGS.happy));}
  }
  if(G.started)drawScene();
  requestAnimationFrame(loop);
}

function sizeUI(){
  // Compute available space and size the screen + controls
  const vw=window.innerWidth,vh=window.innerHeight;
  const gap=Math.min(48,Math.round(vw*0.03));
  // Controls panel fixed width
  const ctrlW=Math.min(220,Math.round(vw*0.28));
  const screenAvailW=vw-ctrlW-gap-48;
  const screenAvailH=vh-80; // headroom for label + padding
  // Screen aspect 72:55, so pick limiting dimension
  let sw=Math.min(screenAvailW,Math.round(screenAvailH*(72/55)));
  let sh=Math.round(sw*(55/72));
  if(sh>screenAvailH){sh=screenAvailH;sw=Math.round(sh*(72/55));}
  sw=Math.max(180,sw);sh=Math.max(138,sh);

  const wrap=document.getElementById('screenWrap');
  const canvas=document.getElementById('gc');
  if(wrap&&canvas){
    wrap.style.width=sw+'px';wrap.style.height=sh+'px';
    canvas.style.width=sw+'px';canvas.style.height=sh+'px';
  }
  const msgEl=document.getElementById('msg');
  if(msgEl) msgEl.style.fontSize=Math.max(5,Math.round(sh*0.065))+'px';

  const label=document.getElementById('screenLabel');
  if(label) label.style.fontSize=Math.max(5,Math.round(sw*0.025))+'px';

  const ctrl=document.getElementById('ctrlPanel');
  if(ctrl) ctrl.style.width=ctrlW+'px';

  // Icon canvases
  const icSz=Math.max(10,Math.round(ctrlW*0.1));
  document.querySelectorAll('.ico canvas').forEach(c=>{c.style.width=icSz+'px';c.style.height=icSz+'px';});
  document.querySelectorAll('.ico span').forEach(s=>{s.style.fontSize=Math.max(4,Math.round(ctrlW*0.042))+'px';});

  // Hearts
  const hSz=Math.max(10,Math.round(ctrlW*0.09));
  document.querySelectorAll('.hearts canvas').forEach(c=>{c.style.width=hSz+'px';c.style.height=hSz+'px';});

  // Bar heights
  const barH=Math.max(4,Math.round(ctrlW*0.04));
  document.querySelectorAll('.st').forEach(el=>el.style.height=barH+'px');
  document.querySelectorAll('.evo-fill').forEach(el=>el.style.height=barH+'px');

  const textSz=Math.max(4,Math.round(ctrlW*0.048));
  document.querySelectorAll('.sn,.info-row,.evo-lbl').forEach(el=>el.style.fontSize=textSz+'px');

  const selH=Math.max(8,Math.round(ctrlW*0.06));
  document.querySelectorAll('.sel').forEach(el=>el.style.height=selH+'px');

  const btnSz=Math.max(28,Math.round(ctrlW*0.2));
  const btnSzSm=Math.max(22,Math.round(ctrlW*0.15));
  const btnFs=Math.max(4,Math.round(btnSz*0.22));
  document.querySelectorAll('.tb').forEach(el=>{
    const sm=el.classList.contains('sm');
    const sz=sm?btnSzSm:btnSz;
    el.style.width=sz+'px';el.style.height=sz+'px';
    el.style.fontSize=Math.max(4,Math.round(sz*0.22))+'px';
  });
}

function buildSetup(){
  const grid=document.getElementById('petGrid');
  const pvSz=Math.min(48,Math.round(window.innerWidth*0.06))+'px';
  PETS.forEach(pet=>{
    const card=document.createElement('div');card.className='pcard'+(pet.id==='mush'?' mush':'');
    const pv=buildPreview(pet);pv.style.width=pvSz;pv.style.height=pvSz;
    const lbl=document.createElement('span');lbl.style.fontSize='clamp(3px,1vw,7px)';lbl.textContent=pet.name;
    const sub=document.createElement('span');sub.style.fontSize='clamp(2px,.8vw,5.5px)';sub.style.color='#3a2a0e';sub.textContent=pet.desc;
    card.appendChild(pv);card.appendChild(lbl);card.appendChild(sub);
    if(pet.id==='mush'||pet.id==='shark'){const badge=document.createElement('div');badge.className='badge'+(pet.id==='shark'?' shark':'');badge.style.fontSize='clamp(2px,.7vw,5px)';badge.textContent=pet.id==='shark'?'NEW':'CHAOS';card.appendChild(badge);}
    card.onclick=()=>{document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('chosen'));card.classList.add('chosen');G.petId=pet.id;G.pet=pet;document.getElementById('startBtn').disabled=false;};
    grid.appendChild(card);
  });
  // Setup text sizing
  const stSz=Math.min(12,Math.round(window.innerWidth*0.018));
  document.querySelector('.setup-title').style.fontSize=stSz+'px';
  document.querySelector('.setup-sub').style.fontSize=Math.round(stSz*0.65)+'px';
  document.querySelector('.hint').style.fontSize=Math.round(stSz*0.55)+'px';
  document.querySelector('.name-lbl').style.fontSize=Math.round(stSz*0.65)+'px';
  document.querySelector('.name-inp').style.fontSize=Math.round(stSz*0.8)+'px';
  document.querySelector('.start-btn').style.fontSize=Math.round(stSz*0.8)+'px';
}

function buildGameControls(){
  // Icons
  const ir=document.getElementById('iconsRow');
  ir.innerHTML=ICONS.map((t,i)=>`<div class="ico" id="ico-${t}" onclick="selIco(${i})"><canvas id="ic${i}" width="7" height="7"></canvas><span>${t.toUpperCase()}</span></div>`).join('');

  // Stats
  const sb=document.getElementById('statsBlock');
  sb.innerHTML=['hunger','happy','clean','energy'].map(k=>`<div class="sr"><span class="sn">${k.slice(0,4).toUpperCase()}</span><div class="st"><div class="sf" id="sf-${k}"></div></div></div>`).join('');

  // Buttons
  const bb=document.getElementById('btnBlock');
  bb.innerHTML=`<button class="tb bl" onclick="doAction()">A</button><button class="tb sm" onclick="doAttn()">!</button><button class="tb bl" onclick="showB()">B</button>`;
}

function startGame(){
  const ni=document.getElementById('nameInp');
  G.petName=(ni.value.trim()||'GUCHI GUCHI').toUpperCase().slice(0,10);
  G.stage='egg';G.started=true;
  if(G.petId==='mush')G.mushParts=buildMushParts();
  document.getElementById('setupOverlay').style.display='none';
  document.getElementById('gameUI').style.display='flex';
  buildGameControls();
  gc=document.getElementById('gc');gx=gc.getContext('2d');gx.imageSmoothingEnabled=false;
  sizeUI();
  updateBars();drawHearts();updateIcons();updateInfo();
  setMsg('Hello! I am '+G.petName+'!');
  document.getElementById('screenLabel').textContent=G.petName;
  lastTick=Date.now();
}

function selIco(i){G.selIcon=i;updateIcons();}
function nextIco(){G.selIcon=(G.selIcon+1)%5;updateIcons();}
function prevIco(){G.selIcon=(G.selIcon+4)%5;updateIcons();}

window.addEventListener('resize',()=>{if(G.started)sizeUI();});
buildSetup();
loop();
</script>
</body>
</html>
