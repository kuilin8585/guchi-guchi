<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0a06">
<title>Guchi Guchi</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  /* iOS safe area */
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}
body{
  background:#0d0a06;
  font-family:'Press Start 2P',monospace;
  display:flex;align-items:center;justify-content:center;
  /* prevent bounce/scroll on iOS */
  position:fixed;width:100%;height:100%;
  touch-action:none;
}

/* starfield dots */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 34% 72%, #3a2a0e 0%, transparent 100%),
    radial-gradient(1px 1px at 58% 28%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 76% 55%, #3a2a0e 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 14%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 88%, #3a2a0e 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 44%, #4a3a1e 0%, transparent 100%),
    radial-gradient(1px 1px at 67% 83%, #3a2a0e 0%, transparent 100%),
    radial-gradient(2px 2px at 8%  60%, #2a1e08 0%, transparent 100%),
    radial-gradient(2px 2px at 92% 38%, #2a1e08 0%, transparent 100%);
  pointer-events:none;z-index:0;
}

/* ── MAIN LAYOUT: side-by-side on landscape/desktop ── */
.ui{
  position:relative;z-index:1;
  display:flex;
  flex-direction:row;
  gap:clamp(10px,2vw,40px);
  align-items:center;
  justify-content:center;
  width:100%;height:100%;
  padding:clamp(8px,2vw,24px);
}

/* ── Portrait / narrow screens: stack vertically ── */
@media (max-aspect-ratio: 1/1), (max-width: 500px) {
  .ui{
    flex-direction:column;
    gap:0;
    padding:4px 6px;
    justify-content:flex-start;
    padding-top:max(8px, env(safe-area-inset-top));
  }
}

/* ── LEFT: Screen panel ── */
.screen-panel{
  display:flex;flex-direction:column;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}

.screen-bezel{
  background:#1e1408;
  border:3px solid #3a2a0a;
  border-radius:12px;
  padding:8px;
  box-shadow:0 0 0 1px #0a0600, 0 8px 40px rgba(0,0,0,.8), inset 0 1px 3px rgba(255,220,100,.08);
}

.screen{
  background:#8db06b;
  border-radius:4px;
  position:relative;overflow:hidden;
}
.screen canvas{
  display:block;
  image-rendering:pixelated;image-rendering:crisp-edges;
}
/* ── ANIMATION LABEL — sits above the canvas, uses the webfont ── */
.anim-label{
  position:absolute;top:0;left:0;right:0;
  padding:3px 5px 2px;
  background:rgba(0,0,0,0.62);
  font-family:'Press Start 2P',monospace;
  font-size:clamp(5px,1.4vw,9px);
  line-height:1.6;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  z-index:6;
  pointer-events:none;
}
.msg{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(10,22,4,.93);color:#aadd70;
  font-family:'Press Start 2P',monospace;
  padding:3px 6px 4px;line-height:2;z-index:5;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.screen-label{
  color:#4a3a1e;
  letter-spacing:3px;
  text-transform:uppercase;
}

/* ── RIGHT / BOTTOM: Controls panel ── */
.ctrl-panel{
  display:flex;flex-direction:column;
  gap:0;
  flex-shrink:0;
}

/* icon menu */
.icons-row{
  display:flex;justify-content:space-between;
  background:#141008;
  border:2px solid #2a1e08;
  border-radius:8px 8px 0 0;
  padding:6px 4px 4px;
  border-bottom:none;
}
.ico{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;cursor:pointer;
  padding:4px 5px;
  border-radius:4px;
  transition:background .1s;
  /* bigger touch target */
  min-width:44px;min-height:44px;justify-content:center;
}
.ico:hover{background:rgba(255,200,80,.06);}
.ico:active{background:rgba(255,200,80,.12);}
.ico canvas{image-rendering:pixelated;}
.ico span{color:#4a3a1e;letter-spacing:1px;}
.ico.on{background:rgba(255,200,80,.10);}
.ico.on span{color:#a88040;}

/* stats block */
.stats-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:6px 10px;
  display:flex;flex-direction:column;
  gap:4px;
}
.sr{display:flex;align-items:center;gap:6px;}
.sn{color:#4a3a1e;flex-shrink:0;text-align:right;}
.st{flex:1;background:#1e1408;border-radius:3px;overflow:hidden;border:1px solid #2a1e08;}
.sf{height:100%;background:#6a8a30;border-radius:3px;transition:width .4s;}
.sf.lo{background:#8a2020;}.sf.md{background:#8a6020;}

/* hearts + info */
.meta-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:5px 10px;
  display:flex;flex-direction:column;
  gap:4px;align-items:center;
}
.hearts{display:flex;gap:5px;justify-content:center;}
.hearts canvas{image-rendering:pixelated;}
.info-row{color:#4a3a1e;text-align:center;}

/* evo bar */
.evo-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:4px 10px 6px;
  display:flex;flex-direction:column;gap:3px;
}
.evo-lbl{color:#3a2a0e;text-align:center;}
.evo-track{width:100%;background:#1e1408;border-radius:3px;overflow:hidden;border:1px solid #2a1e08;}
.evo-fill{height:5px;background:#384888;border-radius:3px;transition:width .6s;}

/* selector bars */
.sel-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-bottom:none;
  padding:6px 10px;
  display:flex;gap:8px;
}
.sel{
  flex:1;background:#1e1408;border-radius:4px;
  border:1px solid #3a2a0a;cursor:pointer;transition:background .1s;
  min-height:36px;
}
.sel:hover{background:#2a1e08;}.sel:active{background:#3a2a10;}

/* action buttons */
.btn-block{
  background:#0e0b05;
  border:2px solid #2a1e08;
  border-top:1px solid #1e1408;
  border-radius:0 0 8px 8px;
  padding:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.tb{
  border-radius:50%;
  background:#8a3828;border:2px solid #5a1808;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#ffe8e0;
  font-family:'Press Start 2P',monospace;
  transition:transform .08s,background .08s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  box-shadow:0 3px 0 #3a0808;
  flex-shrink:0;
  /* minimum 44px touch target */
  min-width:44px;min-height:44px;
}
.tb:hover{background:#a84838;}.tb:active{transform:translateY(2px);box-shadow:0 1px 0 #3a0808;}
.tb.bl{background:#283878;border-color:#081830;box-shadow:0 3px 0 #081828;}
.tb.bl:hover{background:#384898;}.tb.bl:active{transform:translateY(2px);box-shadow:0 1px 0 #081828;}

/* ── SETUP SCREEN ── */
.setup-overlay{
  position:fixed;inset:0;z-index:100;
  background:#0d0a06;
  display:flex;align-items:center;justify-content:center;
  padding:max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.setup-box{
  background:#0e0b05;
  border:2px solid #3a2a0a;
  border-radius:12px;
  padding:clamp(12px,3vh,28px) clamp(12px,4vw,28px);
  width:min(480px,96vw);
  display:flex;flex-direction:column;
  gap:clamp(6px,1.5vh,16px);
  align-items:center;
}
.setup-title{color:#a88040;text-align:center;line-height:1.8;}
.setup-sub{color:#4a3a1e;text-align:center;line-height:2;}
.pet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%;}
.pcard{
  border:1px solid #2a1e08;border-radius:6px;background:#141008;
  padding:8px 4px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:border-color .15s,background .15s;
  /* tap target */
  min-height:72px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.pcard:hover{border-color:#5a4a18;background:#1e1808;}
.pcard:active{border-color:#5a4a18;background:#1e1808;}
.pcard.chosen{border-color:#5878c8;background:#101828;}
.pcard.mush.chosen{border-color:#a838a8;background:#180818;}
.pcard canvas{image-rendering:pixelated;}
.pcard span{color:#6a5a28;text-align:center;line-height:1.7;}
.pcard .badge{padding:1px 4px;border-radius:3px;background:#a838a8;color:#f0b0f0;}
.pcard .badge.shark{background:#283898;color:#b0c8f8;}
.name-sec{display:flex;flex-direction:column;gap:6px;width:100%;}
.name-lbl{color:#6a5a28;}
.name-inp{
  width:100%;padding:10px;
  font-family:'Press Start 2P',monospace;
  background:#0a0806;border:1px solid #3a2a0a;border-radius:5px;
  color:#c8a050;outline:none;
  /* prevent iOS zoom on focus */
  font-size:max(16px, 0.8em);
}
.name-inp:focus{border-color:#5878c8;}
.start-btn{
  width:100%;padding:12px;
  font-family:'Press Start 2P',monospace;
  background:#283878;border:1px solid #081838;border-radius:6px;
  color:#c8d8f8;cursor:pointer;transition:background .1s;
  box-shadow:0 3px 0 #081828;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.start-btn:hover{background:#384898;}
.start-btn:active{background:#1a2858;transform:translateY(2px);box-shadow:0 1px 0 #081828;}
.start-btn:disabled{background:#181818;border-color:#282828;color:#383838;cursor:not-allowed;box-shadow:none;}
.hint{color:#3a2a0e;text-align:center;line-height:2.2;}

/* ── INVENTORY BUTTON ── */
#invBtn{
  position:fixed;top:12px;right:14px;z-index:200;
  background:#1a1208;border:2px solid #5a3a18;border-radius:6px;
  color:#c8a050;font-family:'Press Start 2P',monospace;
  cursor:pointer;padding:4px 8px;line-height:1.6;
  box-shadow:0 2px 0 #3a1a04;transition:background .1s;
}
#invBtn:hover{background:#2a2010;}

/* ── MUTE BUTTON ── */
#muteBtn{
  position:fixed;top:12px;left:14px;z-index:200;
  background:#1a1208;border:2px solid #5a3a18;border-radius:6px;
  color:#c8a050;font-family:'Press Start 2P',monospace;
  cursor:pointer;padding:4px 8px;line-height:1.6;
  box-shadow:0 2px 0 #3a1a04;transition:background .1s;
}
#muteBtn:hover{background:#2a2010;}

/* ── INVENTORY OVERLAY ── */
#invOverlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(5,4,2,.94);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.inv-box{
  background:#0e0b05;border:2px solid #5a3a18;border-radius:12px;
  padding:18px 16px 14px;
  width:min(480px,96vw);max-height:90vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;align-items:center;
}
.inv-title{color:#c8a050;text-align:center;line-height:1.8;}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;}
.inv-card{
  background:#141008;border:1px solid #3a2a08;border-radius:6px;
  padding:6px 4px 5px;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.inv-card.hell{border-color:#8a2020;}
.inv-card.ghost{border-color:#2a3858;}
.inv-card.angel{border-color:#7a6010;}
.inv-card.alive{border-color:#205820;}
.inv-card.alive.playable{border-color:#30a830;box-shadow:0 0 4px rgba(48,168,48,0.25);}
.inv-card.deleting{border-color:#8a1010;box-shadow:0 0 4px rgba(160,20,20,0.3);}
.inv-card canvas{image-rendering:pixelated;}
.inv-card .inv-name{color:#6a5a28;text-align:center;line-height:1.5;}
.inv-card .inv-type{text-align:center;line-height:1.5;}
.inv-card.hell .inv-type{color:#c04020;}
.inv-card.ghost .inv-type{color:#5878a8;}
.inv-card.angel .inv-type{color:#b89020;}
.inv-card.alive .inv-type{color:#407830;}
.inv-empty{color:#3a2a0e;text-align:center;line-height:2;}
.inv-close{
  width:100%;padding:8px;font-family:'Press Start 2P',monospace;
  background:#283878;border:1px solid #081838;border-radius:6px;
  color:#c8d8f8;cursor:pointer;box-shadow:0 2px 0 #081828;
}
.inv-close:hover{background:#384898;}

/* ── CONCERT OVERLAY ── */
#concertOverlay{
  position:fixed;inset:0;z-index:400;
  background:#000;
  display:flex;align-items:center;justify-content:center;
}
#concertCanvas{image-rendering:pixelated;display:block;}
</style>
</head>
<body>

<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <div class="setup-title" id="setupTitle">GUCHI GUCHI</div>
    <div class="setup-sub">Choose your pet's destiny</div>
    <div class="pet-grid" id="petGrid"></div>
    <div class="hint">Starts as a mystery egg — evolves into<br>your chosen pet over time</div>
    <div class="name-sec">
      <div class="name-lbl">Pet name</div>
      <input class="name-inp" id="nameInp" maxlength="10" placeholder="PIXEL">
    </div>
    <button class="start-btn" id="startBtn" disabled onclick="startGame()">HATCH!</button>
  </div>
</div>

<div class="ui" id="gameUI" style="display:none">
  <div class="screen-panel">
    <div class="screen-bezel">
      <div class="screen" id="screenWrap">
        <canvas id="gc" width="72" height="55"></canvas>
        <div class="msg" id="msg">...</div>
      </div>
    </div>
    <div class="screen-label" id="screenLabel">GUCHI GUCHI</div>
  </div>

  <div class="ctrl-panel" id="ctrlPanel">
    <div class="icons-row" id="iconsRow"></div>
    <div class="meta-block">
      <div class="hearts" id="hearts"></div>
      <div class="info-row" id="info-row">EGG AGE 0 | 0pt</div>
    </div>
    <div class="stats-block" id="statsBlock"></div>
    <div class="evo-block">
      <div class="evo-lbl">EVOLUTION</div>
      <div class="evo-track"><div class="evo-fill" id="evo-fill" style="width:0%"></div></div>
    </div>
    <div class="sel-block">
      <div class="sel" id="selL" onclick="prevIco()"></div>
      <div class="sel" id="selR" onclick="nextIco()"></div>
    </div>
    <div class="btn-block" id="btnBlock"></div>
  </div>
</div>

<button id="invBtn" onclick="openInv()">🎒 BAG</button>
<button id="muteBtn" onclick="toggleMute()">🔊</button>

<div id="invOverlay" style="display:none">
  <div class="inv-box">
    <div class="inv-title" id="invTitle">OWNER'S COLLECTION</div>
    <div class="inv-grid" id="invGrid"></div>
    <div class="inv-empty" id="invEmpty">No pets collected yet!</div>
    <button class="inv-close" onclick="closeInv()">CLOSE</button>
  </div>
</div>

<div id="concertOverlay" style="display:none">
  <canvas id="concertCanvas" width="240" height="160"></canvas>
</div>

<script>
const PETS=[
  {id:'bear',  name:'Sasa',        desc:'Soft & cuddly',   body:'#c8a878',ear:'#b89060',belly:'#e8d0a8',nose:'#906040',dark:'#3a200a',outline:'#5a3a18'},
  {id:'rilak', name:'Rilakkuma',   desc:'Lazy & sweet',    body:'#c8a050',ear:'#b08040',belly:'#f0d890',nose:'#804020',dark:'#3a200a',outline:'#5a3a18'},
  {id:'kockas',name:'Kockásfülű', desc:'Checkered ears',  body:'#4a9a50',ear:'#f0f0f0',belly:'#70c878',nose:'#c03030',dark:'#183818',outline:'#204820'},
  {id:'rabbit',name:'Bao Dutu',    desc:'Sweet & bouncy',  body:'#f8e0e8',ear:'#e0a0b8',belly:'#fff0f4',nose:'#e06080',dark:'#301828',outline:'#503040'},
  {id:'shark', name:'Shasha the Shark', desc:'Bite-sized fins', body:'#4878b8',ear:'#2858a8',belly:'#d8eeff',nose:'#1a3870',dark:'#0a1830',outline:'#1a3870'},
  {id:'mush',  name:'Mush Mash',   desc:'Chaos form!',     body:'#b870c8',ear:'#7840b8',belly:'#f0c8f8',nose:'#c03890',dark:'#281040',outline:'#481868'},
];
const STAGES=['egg','baby','child','teen','adult','elder'];
const STAGE_AGES=[0,5,15,30,50,55];
const ICONS=['feed','play','bath','sleep','med'];
const MSGS={
  feed:["Yummy!! ♥","Nom nom~","So tasty!","Thank you!"],
  play:["Wheee!! ♥","So fun!","Hehe ♥♥","Yay!!"],
  bath:["Squeaky clean!","Splash! ♥","All fresh~","Bubble bath!"],
  sleep:["Zzz... ♥","Nighty night~","Sweet dreams","Zzz zzz..."],
  med:["Better now! ♥","Yay! Cured!","Cured ♥"],
  hungry:["...hungry...","Feed me~ ;;","Tummy hurts"],
  unhappy:["So bored...","Play with me?","Lonely ;;"],
  dirty:["Eww stinky...","Need a bath!","So grimy ;;"],
  tired:["...sleepy...","Need sleep ;;","Exhausted..."],
  sick:["Not feeling well","Achoo! ;;","Medicine plz"],
  happy:["♥ u ♥","*wiggles*","Yay yay!","Hehe~"],
  idle:["*sniff sniff*","*blinks*","*yawns*","...hmm..."],
  shark:["CHOMP!","*fin wobble*","Blub blub~","BITE SIZE!"],
  mush:["I am... what?","*glitches*","Mush mash!","hehe chaos"],
};
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function lerpc(a,b,t){
  const ca=parseInt(a.slice(1),16),cb=parseInt(b.slice(1),16);
  const r=Math.round(((ca>>16)&255)*(1-t)+((cb>>16)&255)*t);
  const g=Math.round(((ca>>8)&255)*(1-t)+((cb>>8)&255)*t);
  const bl=Math.round((ca&255)*(1-t)+(cb&255)*t);
  return '#'+[r,g,bl].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

let G={hunger:80,happy:80,clean:80,energy:80,age:0,score:0,coins:200,sleeping:false,frame:0,eyeOpen:true,particles:[],dead:false,hearts:3,ticks:0,sick:false,sickTimer:0,action:null,actionF:0,selIcon:0,petId:null,petName:'',pet:null,stage:'egg',mushParts:null,started:false,feedAnim:null,playAnim:null,bathAnim:null,medAnim:null,lifetimeHappy:0,lifetimeTicks:0,afterlife:null};

// ── NEON GHOST COLORS ───────────────────────────────────────────────────────
// Shocking bright palettes for ghost body and glow — per-ghost seeded random
const NEON_BODIES=[
  '#ff00ff','#00ffff','#ff0099','#00ff99','#ff6600','#00ccff',
  '#ff3300','#33ff00','#ff00cc','#ffff00','#cc00ff','#00ff66',
  '#ff0066','#0066ff','#ff9900','#ff00aa','#aaff00','#00ffaa',
];
const NEON_GLOWS=[
  '#ffffff','#ffff00','#00ffff','#ff88ff','#88ffff','#ffcc00',
  '#ff44ff','#44ffff','#ff8800','#88ff00','#ff0088','#0088ff',
];
// Stable random index from a string seed (petId+petName)
function neonSeed(str){let h=0;for(let i=0;i<str.length;i++){h=(Math.imul(31,h)+str.charCodeAt(i))|0;}return Math.abs(h);}
function neonBodyCol(petId,petName){const s=neonSeed(petId+(petName||''));return NEON_BODIES[s%NEON_BODIES.length];}
function neonGlowCol(petId,petName){const s=neonSeed((petName||'')+petId+7);return NEON_GLOWS[s%NEON_GLOWS.length];}

const OWNER={collection:[]}; // [{petId,petName,type,age,earlyDeath}]

function resetForNewPet(){
  G.hunger=80;G.happy=80;G.clean=80;G.energy=80;
  G.age=0;G.score=0;G.coins=200;G.sleeping=false;
  G.frame=0;G.eyeOpen=true;G.particles=[];G.dead=false;G.hearts=3;
  G.ticks=0;G.sick=false;G.sickTimer=0;
  G.action=null;G.actionF=0;G.selIcon=0;
  G.petId=null;G.petName='';G.pet=null;G.stage='egg';G.mushParts=null;
  G.started=false;G.feedAnim=null;G.playAnim=null;G.bathAnim=null;G.medAnim=null;
  G.lifetimeHappy=0;G.lifetimeTicks=0;G.afterlife=null;

function openInv(){
  const overlay=document.getElementById('invOverlay');
  const grid=document.getElementById('invGrid');
  const empty=document.getElementById('invEmpty');
  const title=document.getElementById('invTitle');
  grid.innerHTML='';
  const hellCount=OWNER.collection.filter(p=>p.type==='hell').length;
  const bandReady=hellCount>=4&&hellCount%4===0;
  title.textContent=bandReady?'★ BAND ASSEMBLED! ★':'OWNER\'S COLLECTION';

  // Remove any stale concert button before rebuilding
  const oldBandBtn=document.getElementById('bandConcertBtn');
  if(oldBandBtn) oldBandBtn.remove();

  if(OWNER.collection.length===0){empty.style.display='';overlay.style.display='flex';return;}
  empty.style.display='none';
  OWNER.collection.forEach((entry,idx)=>{
    const card=document.createElement('div');
    card.className='inv-card '+entry.type+(entry.type==='alive'&&entry.liveState?' playable':'');
    const pet=PETS.find(p=>p.id===entry.petId)||PETS[0];
    const cv=document.createElement('canvas');cv.width=18;cv.height=18;
    if(entry.type==='alive'){
      const c2=cv.getContext('2d');c2.imageSmoothingEnabled=false;
      buildPreviewOnCtx(pet,c2);
    } else {
      drawGhostPreview(cv,entry.type,entry.petId,entry.petName);
    }
    cv.style.width='28px';cv.style.height='28px';
    const nm=document.createElement('div');nm.className='inv-name';nm.style.fontSize='clamp(3px,0.8vw,5px)';nm.textContent=entry.petName.slice(0,6);
    const tp=document.createElement('div');tp.className='inv-type';tp.style.fontSize='clamp(3px,0.7vw,4.5px)';
    const typeLabel={alive:'ALIVE',angel:'ANGEL',ghost:'SPIRIT',hell:'HELL'}[entry.type]||entry.type.toUpperCase();
    tp.textContent=typeLabel+' '+entry.age;
    card.appendChild(cv);card.appendChild(nm);card.appendChild(tp);
    // PLAY button for alive pets that have a saved live state
    if(entry.type==='alive'&&entry.liveState){
      const playBtn=document.createElement('button');
      playBtn.textContent='▶ PLAY';
      playBtn.style.cssText='width:100%;margin-top:2px;padding:2px 0;font-family:\'Press Start 2P\',monospace;font-size:clamp(3px,0.65vw,4.5px);background:#204820;border:1px solid #082808;border-radius:3px;color:#70e870;cursor:pointer;box-shadow:0 1px 0 #041404;';
      playBtn.onmouseenter=()=>{playBtn.style.background='#306830';};
      playBtn.onmouseleave=()=>{playBtn.style.background='#204820';};
      playBtn.onclick=(e)=>{e.stopPropagation();swapToPet(idx);};
      card.appendChild(playBtn);
    }
    // DELETE button — available on every card
    const delBtn=document.createElement('button');
    delBtn.textContent='✕ RELEASE';
    delBtn.style.cssText='width:100%;margin-top:2px;padding:2px 0;font-family:\'Press Start 2P\',monospace;font-size:clamp(3px,0.6vw,4px);background:#1a0808;border:1px solid #4a1010;border-radius:3px;color:#804040;cursor:pointer;';
    delBtn.onmouseenter=()=>{delBtn.style.background='#2a0c0c';delBtn.style.color='#c06060';};
    delBtn.onmouseleave=()=>{delBtn.style.background='#1a0808';delBtn.style.color='#804040';};
    delBtn.onclick=(e)=>{e.stopPropagation();showDeleteConfirm(idx,card);};
    card.appendChild(delBtn);
    grid.appendChild(card);
  });

  // If band is assembled, inject the concert button above the close button
  if(bandReady){
    const hellPets=OWNER.collection.filter(p=>p.type==='hell').slice(-4);
    const bandBtn=document.createElement('button');
    bandBtn.id='bandConcertBtn';
    bandBtn.textContent='🎸 ROCK CONCERT!';
    bandBtn.style.cssText='width:100%;padding:9px;font-family:\'Press Start 2P\',monospace;font-size:clamp(5px,1.2vw,8px);background:#5a0808;border:2px solid #8a1818;border-radius:6px;color:#ff8080;cursor:pointer;box-shadow:0 3px 0 #300404;';
    bandBtn.onmouseenter=()=>{bandBtn.style.background='#7a1010';};
    bandBtn.onmouseleave=()=>{bandBtn.style.background='#5a0808';};
    bandBtn.onclick=()=>{
      closeInv();
      showConcertPrompt(hellPets);
    };
    // Insert before the close button
    const closeBtn=document.querySelector('#invOverlay .inv-close');
    if(closeBtn) closeBtn.parentNode.insertBefore(bandBtn,closeBtn);
    else document.querySelector('.inv-box').appendChild(bandBtn);
  }

  overlay.style.display='flex';
}

// ── DELETE FROM COLLECTION ────────────────────────────────────────────────
// Shows an inline confirmation row inside the card before removing.
function deleteFromCollection(idx){
  OWNER.collection.splice(idx,1);
  updateInvBtn();

}

function showDeleteConfirm(idx, cardEl){
  // Remove any other open confirmations first
  document.querySelectorAll('.del-confirm').forEach(el=>el.remove());
  document.querySelectorAll('.inv-card').forEach(c=>c.classList.remove('deleting'));

  cardEl.classList.add('deleting');
  const row=document.createElement('div');
  row.className='del-confirm';
  row.style.cssText='width:100%;display:flex;gap:2px;margin-top:2px;';

  const yes=document.createElement('button');
  yes.textContent='✕ YES';
  yes.style.cssText='flex:1;padding:2px 0;font-family:\'Press Start 2P\',monospace;font-size:clamp(3px,0.6vw,4px);background:#5a0808;border:1px solid #8a1010;border-radius:3px;color:#ff8080;cursor:pointer;';
  yes.onmouseenter=()=>{yes.style.background='#7a1010';};
  yes.onmouseleave=()=>{yes.style.background='#5a0808';};
  yes.onclick=(e)=>{e.stopPropagation();deleteFromCollection(idx);};

  const no=document.createElement('button');
  no.textContent='NO';
  no.style.cssText='flex:1;padding:2px 0;font-family:\'Press Start 2P\',monospace;font-size:clamp(3px,0.6vw,4px);background:#1a1208;border:1px solid #3a2208;border-radius:3px;color:#6a5020;cursor:pointer;';
  no.onmouseenter=()=>{no.style.background='#2a1e0a';};
  no.onmouseleave=()=>{no.style.background='#1a1208';};
  no.onclick=(e)=>{
    e.stopPropagation();
    row.remove();
    cardEl.classList.remove('deleting');
  };

  row.appendChild(yes);row.appendChild(no);

}

function updateInvBtn(){
  const btn=document.getElementById('invBtn');

// Draw a tiny ghost portrait onto a canvas for the inventory
function drawGhostPreview(canvas, type, petId, petName){
  const ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
  const W=18,H=18;ctx.clearRect(0,0,W,H);
  // background tint
  const bg={angel:'#181418',ghost:'#0a0c14',hell:'#140808'}[type]||'#0e0b05';
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Neon ghost body + glow
  const col=neonBodyCol(petId,petName||'');
  const glow=neonGlowCol(petId,petName||'');
  ctx.fillStyle=col;
  // mini ghost shape
  ctx.fillRect(6,3,7,9);ctx.fillRect(5,5,9,6);
  ctx.fillRect(6,1,6,3);ctx.fillRect(7,0,4,2);
  // tendrils
  ctx.fillRect(5,12,2,2);ctx.fillRect(8,13,2,1);ctx.fillRect(11,12,2,2);
  // pet ear hint
  if(petId==='shark'){ctx.fillStyle=glow;ctx.fillRect(8,0,2,3);}
  else if(petId==='rabbit'){ctx.fillStyle=col;ctx.fillRect(5,0,2,5);ctx.fillRect(11,0,2,5);}
  else{ctx.fillStyle=col;ctx.fillRect(5,2,3,3);ctx.fillRect(11,2,3,3);}
  // glowing eyes
  ctx.fillStyle=glow;
  ctx.fillRect(7,6,2,2);ctx.fillRect(11,6,2,2);
  if(type==='hell'){ctx.fillStyle='#ff0000';ctx.fillRect(7,7,1,1);ctx.fillRect(11,7,1,1);}
  // type accent stripe
  if(type==='angel'){ctx.fillStyle=glow;ctx.fillRect(6,0,7,1);}
  if(type==='hell'){ctx.fillStyle=glow;ctx.fillRect(5,14,8,2);}
  if(type==='ghost'){ctx.fillStyle=glow;ctx.fillRect(5,13,8,1);}
}

function buildPreviewOnCtx(pet,ctx){
  // Reuse buildPreview logic but on a supplied ctx
  const ol=pet.outline||'#4a3a1e';
  if(pet.id==='mush'){const cols=['#b870c8','#7840b8','#40a8c8','#c84040','#40c880'];for(let y=0;y<18;y++)for(let x=0;x<18;x++)if(Math.random()<0.4){ctx.fillStyle=cols[Math.floor(Math.random()*cols.length)];ctx.fillRect(x,y,1,1);}ctx.fillStyle='#481868';ctx.fillRect(4,6,10,9);ctx.fillStyle='#b870c8';ctx.fillRect(5,7,8,7);ctx.fillStyle='#281040';ctx.fillRect(6,9,2,2);ctx.fillRect(10,9,2,2);ctx.fillStyle='#c03890';ctx.fillRect(8,12,2,1);ctx.fillStyle='#7840b8';ctx.fillRect(3,3,3,3);ctx.fillRect(12,3,3,3);return;}
  if(pet.id==='shark'){ctx.fillStyle='#1a3870';ctx.fillRect(7,2,4,6);ctx.fillRect(8,1,2,1);ctx.fillStyle='#2858a8';ctx.fillRect(8,3,2,4);ctx.fillStyle='#1a3870';ctx.fillRect(3,7,12,9);ctx.fillStyle='#4878b8';ctx.fillRect(4,8,10,7);ctx.fillStyle='#d8eeff';ctx.fillRect(5,11,8,3);ctx.fillStyle='#0a1830';ctx.fillRect(5,10,2,2);ctx.fillRect(11,10,2,2);ctx.fillStyle='#1a3870';ctx.fillRect(5,13,3,1);ctx.fillRect(10,13,3,1);for(let i=0;i<3;i++){ctx.fillStyle='#d8eeff';ctx.fillRect(6+i*2,13,1,1);}return;}
  if(pet.id==='kockas'){ctx.fillStyle=pet.dark;ctx.fillRect(4,1,2,6);ctx.fillRect(12,1,2,6);const chk=['#f0f0f0','#181818'];for(let row=0;row<4;row++){ctx.fillStyle=chk[row%2];ctx.fillRect(4,2+row,1,1);ctx.fillStyle=chk[(row+1)%2];ctx.fillRect(5,2+row,1,1);}for(let row=0;row<4;row++){ctx.fillStyle=chk[row%2];ctx.fillRect(12,2+row,1,1);ctx.fillStyle=chk[(row+1)%2];ctx.fillRect(13,2+row,1,1);}}
  else if(pet.id==='rabbit'){ctx.fillStyle=ol;ctx.fillRect(4,0,3,8);ctx.fillRect(11,0,3,8);ctx.fillStyle=pet.ear;ctx.fillRect(5,1,2,6);ctx.fillRect(11,1,2,6);}
  else if(pet.id==='rilak'){ctx.fillStyle=ol;ctx.fillRect(3,4,5,5);ctx.fillRect(10,4,5,5);ctx.fillStyle=pet.ear;ctx.fillRect(4,5,4,4);ctx.fillRect(10,5,4,4);ctx.fillStyle=pet.dark;ctx.fillRect(5,5,2,2);ctx.fillRect(11,5,2,2);}
  else{ctx.fillStyle=ol;ctx.fillRect(4,4,4,5);ctx.fillRect(10,4,4,5);ctx.fillStyle=pet.ear;ctx.fillRect(5,5,3,4);ctx.fillRect(10,5,3,4);}
  ctx.fillStyle=ol;ctx.fillRect(2,7,14,10);ctx.fillStyle=pet.body;ctx.fillRect(3,8,12,8);ctx.fillStyle=pet.belly;ctx.fillRect(5,11,8,4);ctx.fillStyle=pet.dark;ctx.fillRect(5,10,2,2);ctx.fillRect(11,10,2,2);ctx.fillStyle=pet.nose;ctx.fillRect(8,13,2,1);
}

function getStage(){for(let i=STAGE_AGES.length-1;i>=0;i--)if(G.age>=STAGE_AGES[i])return STAGES[i];return 'egg';}
function stageIdx(){return STAGES.indexOf(getStage());}
function evolT(){const si=stageIdx();const na=STAGE_AGES[si+1]||STAGE_AGES[si]+20;const pa=STAGE_AGES[si];return Math.min(1,(si+Math.min(1,(G.age-pa)/Math.max(1,na-pa)))/4);}
function getCols(t){if(!G.pet)return{body:'#d4b896',ear:'#c09878',belly:'#ece0c8',nose:'#907050',dark:'#2a1a04',outline:'#4a3a1e'};const p=G.pet,base={body:'#d4c8a0',ear:'#c0a880',belly:'#ece0c8',nose:'#907050'};return{body:lerpc(base.body,p.body,t),ear:lerpc(base.ear,p.ear,t),belly:lerpc(base.belly,p.belly,t),nose:lerpc(base.nose,p.nose,t),dark:p.dark,outline:p.outline,t};}

// ── Per-pet eating animations ──────────────────────────────────────────────
// G.feedAnim = { frame: 0..59, type: petId }  set when feed action fires
function drawFeedAnim(){
  if(!G.feedAnim) return;
  const fa=G.feedAnim, f=fa.frame, pid=fa.type;
  const cx=36, cy=38;

  if(pid==='bear'){
    // Bear holds a big honey jar, licks it, jar shrinks
    const phase=Math.floor(f/10)%3; // 0=offer, 1=lick, 2=happy
    // honey jar (right side)
    const jx=cx+10, jy=cy-8;
    rect(jx,jy,6,8,'#c8780a');
    rect(jx+1,jy-1,4,2,'#e89820');
    rect(jx+1,jy+1,4,5,'#f0b030'); // honey inside
    rect(jx+2,jy+2,2,3,'#f8d060');
    // lid
    rect(jx,jy-2,6,2,'#8a5010');
    // tongue lick on phase 1
    if(phase===1){
      rect(cx+5,cy-3,4,2,'#e06070'); // tongue out
      rect(cx+6,cy-2,3,1,'#e06070');
      // sparkle
      px(jx-1,jy+1,'#f8f800'); px(jx+6,jy,'#f8f800');
    }
    // stars on phase 2
    if(phase===2){
      for(let i=0;i<3;i++){const sx=jx-3+i*4,sy=jy-4;px(sx,sy,'#f8f800');px(sx+1,sy+1,'#f8f800');}
    }
    // paw reaching up toward jar
    rect(cx+4,cy-1,4,2,fa.cols?fa.cols.body:'#c8a878');
    rect(cx+5,cy-2,3,2,fa.cols?fa.cols.belly:'#e8d0a8');
  }

  else if(pid==='rilak'){
    // Rilakkuma has a BIG pile of rice balls (onigiri), lazily munches
    const munch=Math.floor(f/6)%4;
    // rice ball pile
    const food=[{x:cx-14,y:cy-2},{x:cx-10,y:cy-6},{x:cx-6,y:cy-2},{x:cx+8,y:cy-4}];
    food.forEach((fp,i)=>{
      if(i<food.length-(munch>1?1:0)){ // one disappears mid-munch
        rect(fp.x,fp.y,5,5,'#f0f0e0');
        rect(fp.x+1,fp.y+1,3,3,'#ffffff');
        rect(fp.x+1,fp.y,3,2,'#1a1a1a'); // seaweed wrap
        px(fp.x+2,fp.y+3,'#e06060'); // umeboshi dot
      }
    });
    // cheek puff when eating
    if(munch===1||munch===2){
      rect(cx-4,cy-3,3,3,fa.cols?fa.cols.body:'#c8a050');
      rect(cx+2,cy-3,3,3,fa.cols?fa.cols.body:'#c8a050');
    }
    // wide open mouth
    if(munch===0||munch===2){
      rect(cx-2,cy+1,5,2,'#2a1a04');
      rect(cx-1,cy+2,3,1,'#e06060');
    }
    // arm reaching to pile
    rect(cx-8,cy,5,2,fa.cols?fa.cols.body:'#c8a050');
  }

  else if(pid==='kockas'){
    // Kockásfülű nibbles a carrot super fast, ears wiggle
    const nib=Math.floor(f/5)%4;
    const earWiggle=(nib%2)*2-1;
    // carrot
    rect(cx+8,cy-8,3,9,'#e87820');
    rect(cx+9,cy-9,1,10,'#f09030');
    rect(cx+8,cy-10,3,3,'#308020'); // carrot top
    rect(cx+7,cy-11,5,2,'#208010');
    px(cx+9,cy-12,'#308020');
    // bite taken out
    if(nib>=1) rect(cx+8,cy-3,3,2,'#8db06b'); // bg color = bite
    if(nib>=2) rect(cx+8,cy-5,3,2,'#8db06b');
    if(nib>=3) rect(cx+8,cy-7,3,2,'#8db06b');
    // ear wiggle lines
    px(cx-6,cy-16+earWiggle,'#8db06b');
    px(cx+4,cy-16-earWiggle,'#8db06b');
    // chewing cheek puff
    rect(cx+4,cy-3,3,2,fa.cols?fa.cols.body:'#4a9a50');
    // flying carrot bits
    if(nib===3){
      px(cx+6,cy-4,'#e87820');px(cx+5,cy-6,'#f09030');px(cx+7,cy-2,'#e87820');
    }
  }

  else if(pid==='rabbit'){
    // Bao Dutu nibbles a strawberry delicately, tail wags
    const bite=Math.floor(f/8)%4;
    const tailWag=Math.floor(f/4)%2;
    // strawberry
    rect(cx+9,cy-10,5,6,'#d02828');
    rect(cx+10,cy-11,3,2,'#d02828');
    rect(cx+11,cy-12,1,2,'#30a820'); // stem
    // seeds
    px(cx+9,cy-9,'#f8f870');px(cx+11,cy-8,'#f8f870');px(cx+13,cy-10,'#f8f870');
    // highlight
    rect(cx+10,cy-10,2,2,'#f04848');
    // bite progress
    if(bite>=1) rect(cx+9,cy-7,2,2,'#8db06b');
    if(bite>=2) rect(cx+9,cy-8,3,1,'#8db06b');
    // tail wag
    rect(cx-6,cy+3+tailWag,3,2,fa.cols?fa.cols.belly:'#fff0f4');
    px(cx-5,cy+4+tailWag,'#ffffff');
    // dainty paw holding fruit
    rect(cx+6,cy-4,3,2,fa.cols?fa.cols.body:'#f8e0e8');
    // sparkle hearts when happy bite
    if(bite===2||bite===3){
      px(cx+3,cy-12,'#e06080');px(cx+4,cy-13,'#e06080');px(cx+3,cy-13,'#e06080');
      px(cx+16,cy-8,'#e06080');
    }
  }

  else if(pid==='shark'){
    // Shark CHOMPS a whole fish — jaw opens wide, fish disappears
    const chomp=Math.floor(f/7)%5;
    // fish swimming in (phases 0-1), being chomped (2-3), gone (4)
    if(chomp<=1){
      const fx=cx+8+(1-chomp)*10;
      // fish body
      rect(fx,cy-4,8,5,'#50a8d8');
      rect(fx+1,cy-5,6,1,'#50a8d8');
      rect(fx+1,cy,6,1,'#50a8d8');
      // tail
      rect(fx+7,cy-5,3,3,'#3888b8');rect(fx+8,cy-3,3,4,'#3888b8');
      // eye
      px(fx+2,cy-2,'#ffffff');
      // bubbles
      px(fx-2,cy-5,'#8db06b');px(fx-4,cy-3,'#8db06b');
    }
    if(chomp===2){
      // half fish + jaw open wide
      rect(cx+8,cy-4,5,5,'#50a8d8');
      // huge open jaw
      rect(cx-5,cy-2,10,2,'#0a1830'); // upper jaw
      rect(cx-5,cy+2,10,2,'#0a1830'); // lower jaw
      rect(cx-4,cy-1,8,3,'#1a3870'); // throat
      // teeth
      for(let i=0;i<4;i++){px(cx-4+i*2,cy,'#f0f0f0');px(cx-4+i*2,cy-1,'#f0f0f0');}
      // blood splash lol just red pixel
      px(cx+4,cy-6,'#c02020');px(cx+5,cy-4,'#c02020');
    }
    if(chomp===3){
      // jaw snapping closed
      rect(cx-5,cy-1,10,2,'#0a1830');
      for(let i=0;i<4;i++) px(cx-4+i*2,cy-1,'#f0f0f0');
    }
    if(chomp===4){
      // belly bulge after eating
      rect(cx-5,cy-1,11,4,fa.cols?fa.cols.belly:'#d8eeff');
      rect(cx-4,cy,9,2,'#e8f8ff'); // shine
      // satisfied eyes
      rect(cx-3,cy-5,2,1,'#0a1830');rect(cx+1,cy-5,2,1,'#0a1830');
    }
    // bubbles always
    if(Math.floor(f/8)%2===0){
      px(cx-8,cy-8,'#6ab8d8');px(cx-6,cy-10,'#6ab8d8');
    }
  }

  else if(pid==='mush'){
    // Mush Mash eats glitchy rainbow food — fork and spoon, random colour bites
    const mf=Math.floor(f/6)%6;
    // giant fork left
    rect(cx-14,cy-12,2,14,'#888888');
    rect(cx-14,cy-12,1,5,'#aaaaaa');
    rect(cx-13,cy-14,1,3,'#aaaaaa');
    rect(cx-15,cy-14,1,3,'#aaaaaa');
    rect(cx-16,cy-12,1,3,'#aaaaaa');
    // giant spoon right
    rect(cx+12,cy-10,2,12,'#888888');
    rect(cx+11,cy-12,4,5,'#aaaaaa');
    rect(cx+11,cy-14,4,3,'#999999');
    // random colour food blobs flying in
    const glitchCols=['#f870f8','#70f8f8','#f8f870','#f87070','#70f870','#7070f8'];
    for(let i=0;i<4;i++){
      const bx=cx-6+i*4, by2=cy-8+Math.sin((f*0.3+i)*1.5)*3;
      rect(Math.round(bx),Math.round(by2),2,2,glitchCols[(mf+i)%glitchCols.length]);
    }
    // wide open glitchy mouth
    if(mf%2===0){
      rect(cx-3,cy+1,7,3,'#281040');
      rect(cx-2,cy+2,5,1,glitchCols[mf%glitchCols.length]);
    }
    // eye sparkle
    if(mf===2||mf===4){
      px(cx-3,cy-5,'#f8f800');px(cx+2,cy-5,'#f8f800');
    }
  }

  else {
    // egg / default: just a bowl of food appearing
    const bx=cx+8,by2=cy-4;
    rect(bx,by2+2,8,4,'#c09858');
    rect(bx+1,by2+1,6,2,'#d8b070');
    rect(bx+2,by2,4,2,'#f0c880');
    // steam
    if(Math.floor(f/8)%2===0){
      px(bx+2,by2-2,'#d0d8c0');px(bx+5,by2-3,'#d0d8c0');
    }
  }

  fa.frame++;
  if(fa.frame>=60) G.feedAnim=null;
}

// Draw a tiny friend pet silhouette (simplified 2-colour)
function drawFriend(cx,cy,pet,f){
  const bob=Math.floor(f/9)%2?-1:0,by=cy+bob;
  const b=pet.body,o=pet.outline,e=pet.ear,bl=pet.belly,dk=pet.dark;
  const ea=Math.floor(f/9)%2?1:0;
  if(pet.id==='shark'){
    rect(cx-1,by-9+ea,2,5,'#1a3870');rect(cx,by-8+ea,1,3,b);
    rect(cx-4,by-5,9,7,o);rect(cx-3,by-4,7,5,b);
    rect(cx-3,by-1,7,3,bl);
    rect(cx-4,by-2,1,2,o);rect(cx+3,by-2,1,2,o);
    rect(cx-5,by+2,5,2,o);rect(cx,by+2,5,2,o);
  } else if(pet.id==='kockas'){
    rect(cx-3,by-10+ea,2,6,dk);rect(cx+1,by-10+ea,2,6,dk);
    const chk=['#f0f0f0','#181818'];
    for(let r=0;r<4;r++){px(cx-3,by-9+ea+r,chk[r%2]);px(cx-2,by-9+ea+r,chk[(r+1)%2]);px(cx+1,by-9+ea+r,chk[r%2]);px(cx+2,by-9+ea+r,chk[(r+1)%2]);}
    rect(cx-3,by-5,7,7,o);rect(cx-2,by-4,5,5,b);
    rect(cx-1,by-1,3,2,bl);
    rect(cx-4,by,3,3,o);rect(cx+1,by,3,3,o);
  } else if(pet.id==='rabbit'){

function drawBathAnim(){
  if(!G.bathAnim) return;

  // determine stage: play only the randomly chosen scene (60 frames), then bill (60 frames)

  if(f<60){stage=chosenScene;sf=f;}
  else{stage='bill';sf=f-60;}

// ── MED animation system ──────────────────────────────────────────────────
// G.medAnim = { frame, phase, cols }
// phase: 'offer'→'refuse'→'hide'→'waiting'  (waiting = player must choose)
// After waiting: 'bait'→'cured'  OR  'vet'→'cured'
const VET_COST = 150;
const BAIT_COST = 30;

function drawMedAnim(){
  if(!G.medAnim) return;
  const ma=G.medAnim, f=ma.frame, ph=ma.phase;
  const c=ma.cols;
  const body=c?c.body:'#d4b896', belly=c?c.belly:'#ece0c8';
  const outline=c?c.outline:'#4a3a1e', nose=c?c.nose:'#907050', dk=c?c.dark:'#2a1a04';

  // ── OFFER phase: owner holds out pill, pet looks at it ──
  if(ph==='offer'){
    drawBg();
    // draw pet normally but with curious expression
    drawPet(30,38);
    // pill capsule on right side
    const px2=50, py2=32;
    rect(px2,py2,6,4,'#e04848');   // red half
    rect(px2+3,py2,3,4,'#f0f0f0'); // white half
    rect(px2,py2,6,1,'#c02828');
    // owner hand holding pill (simple)
    rect(px2+1,py2+4,4,4,'#f0c890');
    rect(px2+2,py2+3,2,2,'#e0b880');
    // question mark above pet
    if(Math.floor(f/8)%2===0){
      rect(27,22,2,1,dk);rect(27,23,2,1,dk);rect(26,24,1,1,dk);
      rect(27,25,1,1,dk);rect(27,27,1,1,dk);
    }
    ma.frame++;
    if(ma.frame>30){ma.phase='refuse';ma.frame=0;}
    return;
  }

  // ── REFUSE phase: pet recoils, bitter face, backs away ──
  if(ph==='refuse'){
    drawBg();
    const runX = Math.min(f*3, 36); // pet scoots left
    drawPet(30-runX, 38);
    // bitter face overlay on pet
    const bx=30-runX, by_=36;
    // tongue out / disgust
    rect(bx-2,by_+1,5,1,dk);   // scrunched mouth
    px(bx,by_+2,'#e04060');     // tongue
    px(bx-1,by_+2,'#e04060');
    // squiggly lines = bitter
    if(f%4<2){px(bx+5,by_-3,'#f8d040');px(bx+6,by_-2,'#f8d040');}
    // pill falls / bounces
    const dropY = Math.min(f*2, 20);
    rect(50,32+dropY,6,4,'#e04848');rect(53,32+dropY,3,4,'#f0f0f0');
    if(dropY>=20){px(50,51,'#e04848');px(53,51,'#f0f0f0');} // smashed
    // exclamation
    if(f<15){
      rect(28,18,1,5,dk);rect(28,24,1,1,dk);
    }
    ma.frame++;
    if(ma.frame>36){ma.phase='hide';ma.frame=0;}
    return;
  }

  // ── HIDE phase: pet darts into shadow corner ──
  if(ph==='hide'){
    // dark room
    gx.fillStyle='#050808';gx.fillRect(0,0,144,110);
    // dim floor
    rect(0,48,72,7,'#102010');
    // shadow blob in corner (bottom-left)
    gx.globalAlpha=0.85;
    gx.fillStyle='#000000';
    gx.beginPath();gx.ellipse(14,54,14,6,0,0,Math.PI*2);gx.fill();
    gx.globalAlpha=1;
    // pet partly in shadow — just eyes visible
    const eyeAlpha = Math.max(0, 1-f*0.06);
    const petX = Math.max(6, 30-f*4);
    if(petX>6){
      drawPet(petX, 46);
    } else {
      // fully hidden — just glowing eyes in dark
      gx.globalAlpha=0.7;
      px(8,44,c?c.nose:'#e08080');
      px(11,44,c?c.nose:'#e08080');
      // scared sweat drops
      if(Math.floor(f/6)%2===0){px(6,42,'#60a8e0');px(14,42,'#60a8e0');}
      gx.globalAlpha=1;
    }
    // "..." speech bubble
    if(f>10&&f<30){
      rect(16,38,10,7,'#f0f0e0');rect(16,38,10,1,'#c0c0a0');rect(16,44,10,1,'#c0c0a0');
      px(16,45,'#c0c0a0');px(17,46,'#c0c0a0');
      rect(18,40,2,1,dk);rect(21,40,2,1,dk);rect(24,40,1,1,dk);
    }
    ma.frame++;
    if(ma.frame>45){ma.phase='waiting';ma.frame=0;showMedChoiceUI();}
    return;
  }

  // ── WAITING: keep drawing the hide scene, UI overlay shown in HTML ──
  if(ph==='waiting'){
    gx.fillStyle='#050808';gx.fillRect(0,0,144,110);
    rect(0,48,72,7,'#102010');
    gx.globalAlpha=0.85;gx.fillStyle='#000000';
    gx.beginPath();gx.ellipse(14,54,14,6,0,0,Math.PI*2);gx.fill();
    gx.globalAlpha=1;
    // glowing scared eyes blinking
    if(Math.floor(G.frame/15)%3!==0){
      px(8,44,c?c.nose:'#e08080');px(11,44,c?c.nose:'#e08080');
    }
    if(Math.floor(G.frame/10)%2===0){px(6,42,'#60a8e0');px(14,42,'#60a8e0');}
    return;
  }

  // ── BAIT phase: candy dropped, pet sniffs out, eats it, takes med ──
  if(ph==='bait'){
    if(f<20){
      // drop candy into shadow
      gx.fillStyle='#050808';gx.fillRect(0,0,144,110);rect(0,48,72,7,'#102010');
      gx.globalAlpha=0.85;gx.fillStyle='#000000';gx.beginPath();gx.ellipse(14,54,14,6,0,0,Math.PI*2);gx.fill();gx.globalAlpha=1;
      // candy lolly falling
      const cy2=Math.min(f*2+20,42);
      rect(18,cy2,5,5,'#f84898');rect(19,cy2+1,3,3,'#f870b8');rect(20,cy2,1,1,'#ffffff');
      rect(20,cy2+5,1,5,'#c8a060'); // stick
      // eyes light up
      if(f>10){gx.fillStyle='#f8f840';px(8,44,'#f8f840');px(11,44,'#f8f840');}
    } else {
      // pet creeps out, eats candy, then takes pill happily
      drawBg();
      const comeX = Math.min((f-20)*3, 24);
      drawPet(6+comeX, 38);
      // candy on ground
      if(f<32) rect(18,42,5,5,'#f84898');
      // happy munching after f=32
      if(f>=32 && f<50){
        drawPet(28,38);
        // big happy eyes
        rect(24,34,2,1,dk);rect(28,34,2,1,dk);
        px(23,35,dk);px(30,35,dk);
        // cheek puff
        rect(22,36,3,3,body);rect(29,36,3,3,body);
        // candy wrapper bits
        px(18,38,'#f84898');px(23,40,'#f870b8');
      }
      if(f>=50){
        // pet happily accepts pill now
        drawPet(30,38);
        rect(44,30,6,4,'#e04848');rect(47,30,3,4,'#f0f0f0');
        // pet reaches for it
        rect(36,33,8,2,outline);
        // sparkle
        px(43,28,'#f8f840');px(45,27,'#f8f840');px(47,28,'#f8f840');
      }
    }
    ma.frame++;
    if(ma.frame>75){G.sick=false;G.sickTimer=0;setMsg('Candy first... then medicine ♥');G.medAnim=null;updateBars();drawHearts();}
    return;
  }

  // ── VET phase: vet clinic scene, pet gets injection, cured ──
  if(ph==='vet'){
    // clinic white walls
    gx.fillStyle='#e8f0f8';gx.fillRect(0,0,144,110);
    // clinic details
    rect(0,0,72,2,'#c0d0e0');
    // red cross sign
    rect(28,3,5,5,'#e02020');rect(30,2,1,7,'#e02020');rect(27,4,7,1,'#e02020');
    // examination table
    rect(10,34,52,6,'#4878a8');rect(11,35,50,4,'#c0d8f0'); // cushion
    rect(10,40,52,3,'#304888');
    rect(12,43,8,7,'#304888');rect(50,43,8,7,'#304888');
    // pet on table, scared
    const petShake=f<20?Math.floor(f/3)%3-1:0;
    drawPet(36,32+petShake);
    // vet hand with syringe
    const needleX = f<30 ? 55 : Math.max(55-f+30, 46);
    const needleY = 28;
    rect(needleX,needleY,8,3,'#f0c890');      // vet hand
    rect(needleX+7,needleY,5,2,'#d0d0e0');    // syringe body
    rect(needleX+11,needleY+1,4,1,'#a0a0c0'); // liquid inside
    rect(needleX+12,needleY,3,1,'#c0c0d8');   // plunger
    px(needleX+15,needleY+1,'#c0c0d8');       // needle tip
    // pet scared expression before needle
    if(f<35){
      rect(32,28+petShake,2,2,dk);rect(36,28+petShake,2,2,dk);
      px(30,29+petShake,'#60a8e0');px(39,29+petShake,'#60a8e0'); // tears
      rect(33,32+petShake,5,1,dk);px(33,31+petShake,dk);px(37,31+petShake,dk); // scared mouth
    }
    // ouch moment
    if(f>=35&&f<45){
      rect(32,27+petShake,2,2,dk);rect(36,27+petShake,2,2,dk);
      rect(33,31+petShake,6,1,dk);
      // star burst at injection site
      for(let i=0;i<4;i++) px(36+Math.cos(i)*4,30+petShake+Math.sin(i)*3,'#f8f840');
      // !!
      rect(28,22,1,5,dk);rect(28,28,1,1,dk);
      rect(31,22,1,5,dk);rect(31,28,1,1,dk);
    }
    // happy/relieved after
    if(f>=50){
      rect(32,28,2,1,dk);rect(36,28,2,1,dk);  // ^ ^ eyes
      px(32,29,dk);px(37,29,dk);
      rect(33,32,5,1,dk);px(33,31,dk);px(37,31,dk); // smile
      // sparkle health stars
      for(let i=0;i<3;i++){if(f>50+i*6){px(24+i*8,22,'#70e840');px(25+i*8,21,'#70e840');}}
      // coin receipt
      if(f>55){
        rect(48,20,18,14,'#f8f4e0');rect(49,21,16,12,'#ffffff');
        gx.fillStyle='#3a2a0a';gx.font='5px monospace';gx.fillText('VET',98,48);
        gx.fillStyle='#c83020';gx.fillText('-¥'+VET_COST,96,56);
      }
    }
    ma.frame++;
    if(ma.frame>80){G.sick=false;G.sickTimer=0;G.coins=Math.max(0,G.coins-VET_COST);setMsg('Vet visit: -¥'+VET_COST+'. All better!');G.medAnim=null;updateBars();drawHearts();updateInfo();}
    return;
  }
}

// ── AFTERLIFE ANIMATIONS ──────────────────────────────────────────────────
// G.afterlife = { type:'angel'|'hell'|'ghost', frame:0, petId }
// type determined by lifetime happiness average:
//   >= 65 → guardian angel (light, golden, floating)
//   >= 35 → tombstone ghost (neutral, wandering)
//   <  35 → angry hell ghost (red, fire, rage)

function getAfterlifeType(){
  const avg = G.lifetimeTicks>0 ? G.lifetimeHappy/G.lifetimeTicks : 50;
  if(avg>=65) return 'angel';
  if(avg>=35) return 'ghost';
  return 'hell';
}

// Draw a ghost silhouette styled after the pet
function drawGhostBody(cx,cy,pid,col,glowCol,f){
  const bob=Math.floor(f/18)%2?-1:1; // slow gentle float
  const cy2=cy+bob;
  // Ghost base sheet shape (rounded top, wiggly bottom)
  const wave=Math.floor(f/12)%3;
  // body
  rect(cx-6,cy2-14,13,16,col);
  rect(cx-7,cy2-10,15,10,col);
  // rounded top
  rect(cx-5,cy2-16,11,4,col);
  rect(cx-4,cy2-17,9,2,col);
  rect(cx-3,cy2-18,7,2,col);
  // wiggly bottom tendrils
  rect(cx-7,cy2+1,4,3,col);
  rect(cx-3,cy2+2,4,2,col);
  rect(cx+1,cy2+1,4,3,col);
  if(wave===1){px(cx-7,cy2+3,col);px(cx+4,cy2+3,col);}
  if(wave===2){rect(cx-3,cy2+3,4,1,col);}

  // Pet-specific ghost facial features
  if(pid==='shark'){
    // Ghost shark: dorsal fin on top, angry/serene shark teeth
    rect(cx-1,cy2-20,3,5,'#b0d8ff');
    rect(cx,cy2-20,1,4,'#d0eeff');
    // ghost fin glow
    gx.globalAlpha=0.3;rect(cx-2,cy2-19,5,5,glowCol);gx.globalAlpha=1;
    // eyes
    rect(cx-3,cy2-12,2,2,glowCol);rect(cx+1,cy2-12,2,2,glowCol);
    px(cx-3,cy2-11,col);px(cx+2,cy2-11,col); // pupils
    // ghost shark teeth row
    for(let i=0;i<4;i++) px(cx-3+i*2,cy2-7,'#ffffff');
  } else if(pid==='rabbit'){
    // Ghost rabbit: long tall ears float up
    rect(cx-5,cy2-22,3,10,col);rect(cx+2,cy2-22,3,10,col);
    rect(cx-4,cy2-21,2,8,glowCol);rect(cx+2,cy2-21,2,8,glowCol);
    // dreamy eyes
    rect(cx-3,cy2-12,2,1,glowCol);rect(cx+1,cy2-12,2,1,glowCol);
    px(cx-4,cy2-11,glowCol);px(cx+3,cy2-11,glowCol);
    px(cx,cy2-9,col); // nose
  } else if(pid==='rilak'){
    // Ghost rilakkuma: round ears, lazy half-closed eyes
    rect(cx-6,cy2-17,4,4,col);rect(cx+2,cy2-17,4,4,col);
    rect(cx-5,cy2-16,3,3,glowCol);rect(cx+2,cy2-16,3,3,glowCol);
    rect(cx-2,cy2-14,1,1,col);rect(cx+1,cy2-14,1,1,col); // dark spots on ears
    // lazy eyes
    rect(cx-3,cy2-12,3,1,glowCol);rect(cx+0,cy2-12,3,1,glowCol);
    px(cx,cy2-9,col);
  } else if(pid==='kockas'){
    // Ghost kockas: checkered ear ghosts
    rect(cx-5,cy2-20,3,8,col);rect(cx+2,cy2-20,3,8,col);
    // checkered pattern visible through ghost
    const chk=['#ffffff','#aaaaaa'];
    for(let r=0;r<5;r++){gx.globalAlpha=0.5;rect(cx-5,cy2-20+r,1,1,chk[r%2]);rect(cx+4,cy2-20+r,1,1,chk[(r+1)%2]);gx.globalAlpha=1;}
    // eyes
    rect(cx-3,cy2-12,2,2,glowCol);rect(cx+1,cy2-12,2,2,glowCol);
    px(cx,cy2-9,col);
  } else if(pid==='mush'){
    // Ghost mush: glitchy, multiple colours flickering
    const gc2=['#f870f8','#70f8f8','#f8f870'];
    gx.globalAlpha=0.5+Math.sin(f*0.3)*0.3;
    rect(cx-6,cy2-18,4,4,gc2[Math.floor(f/8)%3]);
    rect(cx+2,cy2-18,4,4,gc2[(Math.floor(f/8)+1)%3]);
    gx.globalAlpha=1;
    // glitchy eyes
    rect(cx-3,cy2-12,2,2,gc2[Math.floor(f/5)%3]);rect(cx+1,cy2-12,2,2,gc2[(Math.floor(f/5)+1)%3]);
    px(cx,cy2-9,col);
  } else {
    // default bear ghost
    rect(cx-5,cy2-17,4,4,col);rect(cx+1,cy2-17,4,4,col);
    rect(cx-4,cy2-16,3,3,glowCol);rect(cx+1,cy2-16,3,3,glowCol);
    // gentle eyes
    rect(cx-3,cy2-12,2,2,glowCol);rect(cx+1,cy2-12,2,2,glowCol);
    px(cx,cy2-9,col);
  }
}

function drawAfterlife(){
  const al=G.afterlife, f=al.frame, pid=al.petId;
  if(!al) return;
  const pet=PETS.find(p=>p.id===pid)||PETS[0];

  // Shocking neon ghost colors — unique per pet
  const neonBody=neonBodyCol(pid,G.petName);
  const neonGlow=neonGlowCol(pid,G.petName);

  // ── GUARDIAN ANGEL ──────────────────────────────────────────
  if(al.type==='angel'){
    // Heavenly sky: soft golden gradient
    for(let y=0;y<55;y++){
      const r=Math.round(220+y*0.5),g2=Math.round(200+y*0.3),b=Math.round(255-y*2);
      gx.fillStyle=`rgb(${Math.min(255,r)},${Math.min(255,g2)},${Math.min(255,b)})`;
      gx.fillRect(0,y*2,144,2);
    }
    // Clouds
    [[8,10],[20,6],[40,12],[55,7],[62,14]].forEach(([cx3,cy3])=>{
      rect(cx3-3,cy3,10,5,'#ffffff');rect(cx3,cy3-2,6,3,'#ffffff');rect(cx3-1,cy3-1,8,2,'#f8f8ff');
    });
    // Rays of light
    gx.globalAlpha=0.12+Math.sin(f*0.04)*0.06;
    for(let i=0;i<5;i++){
      gx.fillStyle='#fff8c0';
      gx.beginPath();gx.moveTo((28+i*8)*2,0);gx.lineTo((24+i*8)*2,110);gx.lineTo((30+i*8)*2,110);gx.closePath();gx.fill();
    }
    gx.globalAlpha=1;
    // Floating sparkles
    const spk=Math.floor(f/6)%8;
    const spkPos=[[10,20],[20,12],[30,25],[45,10],[55,22],[60,14],[15,30],[50,28]];
    spkPos.forEach(([sx,sy],i)=>{if(i===spk||i===(spk+3)%8){px(sx,sy,'#f8f840');px(sx+1,sy,'#fff880');}});
    // Halo above ghost
    const hx=36, hy=14, hr=7;
    gx.globalAlpha=0.8+Math.sin(f*0.1)*0.2;
    for(let a=0;a<Math.PI*2;a+=Math.PI/8){
      const px2=Math.round(hx+Math.cos(a)*hr), py2=Math.round(hy+Math.sin(a)*hr*0.35);
      px(px2,py2,'#f8e840');
    }
    gx.globalAlpha=1;
    // Wings (sized to pet)
    const wingFlap=Math.sin(f*0.08)*3;
    gx.globalAlpha=0.75;
    gx.fillStyle='#ffffff';
    gx.beginPath();gx.moveTo(54,54);gx.quadraticCurveTo(34,Math.round(36+wingFlap)*2,44,62);gx.closePath();gx.fill();
    gx.beginPath();gx.moveTo(90,54);gx.quadraticCurveTo(108,Math.round(36+wingFlap)*2,98,62);gx.closePath();gx.fill();
    gx.globalAlpha=0.4;gx.strokeStyle='#e8e8ff';gx.lineWidth=0.5;
    gx.beginPath();gx.moveTo(54,56);gx.quadraticCurveTo(38,Math.round(38+wingFlap)*2,46,64);gx.stroke();
    gx.beginPath();gx.moveTo(90,56);gx.quadraticCurveTo(106,Math.round(38+wingFlap)*2,96,64);gx.stroke();
    gx.globalAlpha=1;
    // Ghost body: neon-tinted
    drawGhostBody(36,38,pid,neonBody,neonGlow,f);
    // Peaceful smile
    rect(33,29,5,1,'#c0b840');px(33,28,'#c0b840');px(37,28,'#c0b840');
    // Stars of blessing
    const bs=Math.floor(f/20)%4;
    const bsPos=[{x:20,y:10},{x:30,y:6},{x:44,y:8},{x:52,y:12}];
    if(bs<bsPos.length){px(bsPos[bs].x,bsPos[bs].y,'#f8f840');px(bsPos[bs].x+1,bsPos[bs].y,'#f8f840');}
    // Message
    gx.fillStyle='rgba(0,0,0,0.3)';gx.fillRect(0,0,144,14);
    gx.fillStyle='#f8e840';gx.font='bold 7px monospace';
    const ageMsg = Math.floor(f/60)%2===0 ? 'GUARDIAN ANGEL' : pid.toUpperCase()+' ANGEL';
    gx.fillText(ageMsg,4,10);

  // ── ANGRY HELL GHOST ──────────────────────────────────────────
  } else if(al.type==='hell'){
    // Hellish background
    for(let y=0;y<55;y++){
      const r=Math.round(80+y*2.5+Math.sin(f*0.05+y*0.1)*10);
      gx.fillStyle=`rgb(${Math.min(200,r)},${Math.round(r*0.15)},0)`;
      gx.fillRect(0,y*2,144,2);
    }
    // Lava cracks at bottom
    gx.fillStyle='#ff6000';
    [[0,50],[10,48],[20,52],[35,49],[50,51],[60,50]].forEach(([cx3,cy3])=>{
      gx.beginPath();gx.moveTo(cx3*2,cy3*2);gx.lineTo((cx3+5)*2,(cy3+2)*2);gx.lineTo((cx3+2)*2,cy3*2+4);gx.closePath();gx.fill();
    });
    // Glowing lava pools
    gx.globalAlpha=0.6+Math.sin(f*0.1)*0.3;
    gx.fillStyle='#ff4000';gx.beginPath();gx.ellipse(20,106,16,5,0,0,Math.PI*2);gx.fill();
    gx.fillStyle='#ff6020';gx.beginPath();gx.ellipse(100,108,14,4,0,0,Math.PI*2);gx.fill();
    gx.globalAlpha=1;
    // Fire columns
    for(let i=0;i<4;i++){
      const fx2=8+i*16, fphase=Math.floor((f+i*12)/8)%4;
      const fcols=['#c82000','#e03000','#f85000','#ff7000'];
      rect(fx2,44-fphase*2,4,6+fphase*2,fcols[fphase]);
      rect(fx2+1,42-fphase*2,2,4,fcols[(fphase+1)%4]);
    }
    // Chain shackles
    const chainSway=Math.floor(f/15)%3-1;
    rect(22,46+chainSway,28,2,'#888888');
    for(let i=0;i<5;i++) px(23+i*5,46+chainSway,'#aaaaaa');
    // Ghost body: neon-tinted
    drawGhostBody(36,36,pid,neonBody,neonGlow,f);
    // Angry brow
    const eyeF=Math.floor(f/8)%2;
    rect(30,22+eyeF,8,1,'#ff8800');px(30,22+eyeF,'#ffaa00');px(37,22+eyeF,'#ffaa00');
    // Rage eyes
    rect(30,24,3,3,'#ffaa00');rect(35,24,3,3,'#ffaa00');
    px(31,25,'#ff0000');px(36,25,'#ff0000');
    // Snarling teeth
    rect(30,30,8,2,hc);
    for(let i=0;i<4;i++){px(30+i*2,31,'#ffffff');px(31+i*2,30,hc);}
    // Rage flames around ghost
    const ragef=Math.floor(f/5)%6;
    const ragePts=[{x:24,y:20},{x:48,y:18},{x:22,y:30},{x:50,y:30},{x:20,y:22},{x:52,y:22}];
    ragePts.forEach((pt,i)=>{
      if((i+ragef)%3===0){px(pt.x,pt.y,'#ff8000');px(pt.x,pt.y-1,'#ffaa00');}
    });
    if(Math.floor(f/30)%2===0){
      gx.globalAlpha=0.2;gx.fillStyle='#ff0000';gx.beginPath();gx.arc(72,50,30,0,Math.PI*2);gx.fill();
      gx.globalAlpha=1;
    }
    // Message
    gx.fillStyle='rgba(0,0,0,0.5)';gx.fillRect(0,0,144,14);
    gx.fillStyle='#ff6000';gx.font='bold 7px monospace';
    const hellMsg=al.earlyDeath?(Math.floor(f/60)%2===0?'DIED IN RAGE!!':'TOO SOON... >:('):(Math.floor(f/60)%2===0?'ANGRY GHOST':'IN PURGATORY!');
    gx.fillText(hellMsg,4,10);

  // ── TOMBSTONE GHOST ──────────────────────────────────────────
  } else {
    // Misty moonlit graveyard
    for(let y=0;y<55;y++){
      const v=Math.round(8+y*0.3+Math.sin(f*0.02+y*0.05)*3);
      gx.fillStyle=`rgb(${v},${Math.round(v*1.1)},${Math.round(v*1.4)})`;
      gx.fillRect(0,y*2,144,2);
    }
    // Grass
    for(let x=0;x<72;x+=3){px(x,50,'#204018');px(x+1,49,'#182c12');px(x+2,50,'#204018');}
    rect(0,51,72,4,'#182c12');rect(0,53,72,2,'#102008');
    // Moon
    rect(56,3,8,8,'#d8d8c0');rect(57,2,6,1,'#d8d8c0');rect(57,11,6,1,'#d8d8c0');
    px(56,3,'#0a0c12');px(63,3,'#0a0c12');
    gx.globalAlpha=0.08+Math.sin(f*0.03)*0.04;gx.fillStyle='#d8e8ff';
    gx.beginPath();gx.arc(120,12,20,0,Math.PI*2);gx.fill();gx.globalAlpha=1;
    // Stars
    [[6,6],[18,4],[30,8],[42,3],[14,12],[50,9]].forEach(([sx,sy])=>{
      if(Math.floor((f+sx*3)%28)<14) px(sx,sy,'#c8d0e0');
    });
    // Tombstone
    const ts=Math.floor(f/80)%2;
    rect(28,28+ts,16,20,'#383848');rect(29,29+ts,14,18,'#484858');
    rect(30,26+ts,12,4,'#383848');rect(32,24+ts,8,4,'#383848');rect(33,23+ts,6,2,'#484858');
    // RIP text
    gx.fillStyle='#888898';gx.font='bold 6px monospace';gx.fillText('R.I.P',60,70+ts*2);
    const nameShort=G.petName.slice(0,5);
    gx.fillStyle='#7080a0';gx.font='5px monospace';gx.fillText(nameShort,Math.round(62-nameShort.length*1.5),84+ts*2);
    // Cross on stone
    rect(35,27+ts,2,8,'#585868');rect(32,30+ts,8,2,'#585868');
    // Ghost with neon color
    drawGhostBody(36,24,pid,neonBody,neonGlow,f);
    // Sad/neutral eyes
    rect(33,12,2,2,'#7090b0');rect(37,12,2,2,'#7090b0');
    const mf=Math.floor(f/20)%3;
    if(mf===0) rect(33,16,5,1,'#7090b0');
    if(mf===1){px(33,16,'#7090b0');rect(34,17,3,1,'#7090b0');px(36,16,'#7090b0');}
    if(mf===2){px(33,17,'#7090b0');rect(34,16,3,1,'#7090b0');px(36,17,'#7090b0');}
    // Mist wisps
    gx.globalAlpha=0.25+Math.sin(f*0.05)*0.1;gx.fillStyle='#8090c0';
    [[4,38],[14,42],[60,40],[68,44]].forEach(([mx,my])=>{
      const moff=Math.floor((f*0.3+mx)%14);
      gx.fillRect(mx*2,my*2-moff,12,3);
    });
    gx.globalAlpha=1;
    // Floating orbs
    const orb=Math.floor(f/25)%4;
    const orbPos=[{x:12,y:30},{x:60,y:28},{x:8,y:40},{x:64,y:36}];
    gx.globalAlpha=0.7;gx.fillStyle='#a0c0f0';
    if(orb<orbPos.length){gx.beginPath();gx.arc(orbPos[orb].x*2,orbPos[orb].y*2,3,0,Math.PI*2);gx.fill();}
    gx.globalAlpha=1;
    // Message
    gx.fillStyle='rgba(0,0,0,0.5)';gx.fillRect(0,0,144,14);
    gx.fillStyle='#8090c0';gx.font='bold 7px monospace';
    const ghostMsg=al.earlyDeath?(Math.floor(f/60)%2===0?'GONE TOO SOON':'MISERABLE GHOST'):(Math.floor(f/60)%2===0?'WANDERING GHOST':pid.toUpperCase()+' SPIRIT');
    gx.fillText(ghostMsg,4,10);
  }
  al.frame++;
}

function drawDead(){clr();const t2=Math.floor(G.frame/8)%2;rect(30,15+t2,14,12,'#2a1a04');rect(31,16+t2,12,10,'#c8e890');rect(32,19+t2,3,3,'#2a1a04');px(32,19+t2,'#c8e890');px(34,19+t2,'#c8e890');rect(37,19+t2,3,3,'#2a1a04');px(37,19+t2,'#c8e890');px(39,19+t2,'#c8e890');rect(33,24+t2,5,1,'#2a1a04');}
function getMood(){if(G.sick)return 'sick';const mn=Math.min(G.hunger,G.happy,G.clean,G.energy);if(mn<20)return 'sad';if(mn>60&&G.happy>60)return 'happy';return 'normal';}
function drawScene(){
  if(G.afterlife){clr();drawAfterlife();return;}
  if(G.dead){drawDead();return;}
  if(G.medAnim&&G.medAnim.phase!=='waiting'){drawMedAnim();return;}
  if(G.medAnim&&G.medAnim.phase==='waiting'){drawMedAnim();return;}
  if(G.bathAnim){

    if(G.sick&&Math.floor(G.frame/10)%2===0){rect(27,9,5,5,'#3d6622');rect(28,8,3,1,'#3d6622');rect(26,10,1,3,'#3d6622');rect(30,10,1,3,'#3d6622');}

  if(G.playAnim){drawBg();drawPlayAnim();if(G.sick&&Math.floor(G.frame/10)%2===0){rect(27,9,5,5,'#3d6622');rect(28,8,3,1,'#3d6622');rect(26,10,1,3,'#3d6622');rect(30,10,1,3,'#3d6622');}return;}
  drawBg();drawPet(36,38);drawParticles();if(G.feedAnim)drawFeedAnim();if(G.sick&&Math.floor(G.frame/10)%2===0){rect(27,9,5,5,'#3d6622');rect(28,8,3,1,'#3d6622');rect(26,10,1,3,'#3d6622');rect(30,10,1,3,'#3d6622');}

  cx2.fillStyle=off;cx2.fillRect(0,0,7,7);cx2.fillStyle=on;

function doAction(){
  if(!G.started||G.dead)return;if(G.action)return;
  ensureAudio();
  const type=ICONS[G.selIcon];G.action=type;G.actionF=50;spawnP();
  const isShark=G.petId==='shark',isMush=G.petId==='mush';
  if(type==='feed'){setMsg(isShark?'CHOMP CHOMP!':isMush?rnd(MSGS.mush)+' *eats*':rnd(MSGS.feed));G.hunger=Math.min(100,G.hunger+25);if(G.sleeping)G.sleeping=false;
    const t=evolT(),c=getCols(t);G.feedAnim={frame:0,type:G.petId,cols:c};G.actionF=65;SFX.feed();}
  else if(type==='play'){
    const act=PLAY_ACTIVITIES[Math.floor(Math.random()*PLAY_ACTIVITIES.length)];
    setMsg(rnd(PLAY_MSGS[act]));
    G.happy=Math.min(100,G.happy+28);G.energy=Math.max(0,G.energy-10);if(G.sleeping)G.sleeping=false;
    const friends=PETS.filter(p=>p.id!==G.petId);
    const fr=friends[Math.floor(Math.random()*friends.length)];
    const t=evolT(),c=getCols(t);
    G.playAnim={frame:0,activity:act,friend:fr,cols:c,friendCols:fr};
    G.actionF=165;SFX.play();
  }
  else if(type==='bath'){
    if(isShark){setMsg('Already wet...');}
    else if(isMush){setMsg('Mush gets soggy');}
    else{setMsg('Welcome to the spa! ♥');}
    G.clean=Math.min(100,G.clean+35);G.happy=Math.min(100,G.happy+10);if(G.sleeping)G.sleeping=false;
    const t2=evolT(),c2=getCols(t2);
    const bathScenes=['onsen','scrub','sauna','massage','facemask'];
    const chosenScene=bathScenes[Math.floor(Math.random()*bathScenes.length)];
    G.bathAnim={frame:0,cols:c2,scene:chosenScene};
    G.actionF=125;SFX.bath();
  }
  else if(type==='sleep'){setMsg(isShark?'Sharks never sleep':isMush?'*glitch sleep*':rnd(MSGS.sleep));G.sleeping=true;G.energy=Math.min(100,G.energy+40);SFX.sleep();}
  else if(type==='med'){
    if(!G.sick){setMsg('Not sick right now~');return;}
    if(isShark){setMsg('Sharks dont get sick~');G.sick=false;G.sickTimer=0;return;}
    const refuses = isMush ? Math.random()<0.8 : Math.random()<0.55;
    if(refuses){
      const c3=getCols(evolT());
      G.medAnim={frame:0,phase:'offer',cols:c3};
      G.action='med';G.actionF=999;
      setMsg(rnd(['Eww bitter!!','No no no!!','*runs away*','I HATE medicine!!']));
    } else {
      G.sick=false;G.sickTimer=0;
      setMsg(rnd(MSGS.med));SFX.med();
    }
  }
  G.score+=10;G.coins+=5;updateBars();drawHearts();updateInfo();
}
function doAttn(){
  if(!G.started||G.dead)return;
  ensureAudio();SFX.btn();
  const mn=Math.min(G.hunger,G.happy,G.clean,G.energy);
  if(G.sick)setMsg(rnd(MSGS.sick));
  else if(G.hunger===mn&&G.hunger<40)setMsg(rnd(MSGS.hungry));
  else if(G.happy===mn&&G.happy<40)setMsg(rnd(MSGS.unhappy));
  else if(G.clean===mn&&G.clean<40)setMsg(rnd(MSGS.dirty));
  else if(G.energy===mn&&G.energy<40)setMsg(rnd(MSGS.tired));
  else setMsg(G.petId==='shark'?rnd(MSGS.shark):G.petId==='mush'?rnd(MSGS.mush):rnd(MSGS.happy));
}
function showB(){
  if(!G.started||G.afterlife)return;
  ensureAudio();SFX.btn();
  if(G.petId==='mush'&&G.mushParts){const p=G.mushParts;setMsg('Body:'+p.body.id+' Face:'+p.face.id);}
  else setMsg(G.petName+' ['+Math.round(evolT()*100)+'% '+G.petId.toUpperCase()+']');
}

let lastTick=Date.now(),idleTimer=0;
function loop(){
  G.frame++;
  if(G.frame%20===0)G.eyeOpen=false;
  if(G.frame%20===3)G.eyeOpen=true;
  if(G.action){G.actionF--;if(G.actionF<=0){G.action=null;if(G.medAnim&&G.medAnim.phase==='waiting'){removeMedChoiceUI();G.medAnim=null;}}}
  if(G.started&&!G.dead&&!G.afterlife){
    const now=Date.now();
    if(now-lastTick>3500){
      lastTick=now;G.ticks++;G.age=Math.floor(G.ticks/4);
      // track lifetime happiness
      G.lifetimeHappy+=(G.hunger+G.happy+G.clean+G.energy)/4;
      G.lifetimeTicks++;
      // Check age 60 — natural end of life
      if(G.age>=60){
        const type=getAfterlifeType();
        G.afterlife={type,frame:0,petId:G.petId};
        const msgs={angel:G.petName+' ascends as a guardian angel ♥',hell:G.petName+' becomes an angry spirit...',ghost:G.petName+' wanders as a gentle ghost'};
        setMsg(msgs[type]);
        updateBars();drawHearts();updateInfo();
        showCollectUI();
        // don't return — fall through to drawScene and RAF continues
      } else {
        const prev=G.stage;G.stage=getStage();
        if(G.stage!==prev){setMsg(G.petName+' is growing!');if(G.petId==='mush')G.mushParts=buildMushParts();}
        if(!G.sleeping){G.hunger=Math.max(0,G.hunger-4);G.happy=Math.max(0,G.happy-3);G.clean=Math.max(0,G.clean-3);G.energy=Math.max(0,G.energy-3);}
        else{G.energy=Math.min(100,G.energy+6);G.hunger=Math.max(0,G.hunger-1);}
        if(!G.sick&&Math.random()<0.06&&G.ticks>3){G.sick=true;G.sickTimer=18;setMsg(rnd(MSGS.sick));}
        if(G.sick){G.sickTimer--;if(G.sickTimer<=0)G.sick=false;}
        const mn=Math.min(G.hunger,G.happy,G.clean,G.energy);
        if(mn<15){G.hearts=Math.max(0,G.hearts-1);if(G.hearts<=0){
          const avg2=G.lifetimeTicks>0?G.lifetimeHappy/G.lifetimeTicks:30;
          const dtype=avg2<35?'hell':'ghost';
          G.afterlife={type:dtype,frame:0,petId:G.petId,earlyDeath:true};
          setMsg(dtype==='hell'?G.petName+' died in rage!! ;;':G.petName+' faded away... ;;');
          showCollectUI();
        } else setMsg(G.sick?rnd(MSGS.sick):G.hunger===mn?rnd(MSGS.hungry):G.happy===mn?rnd(MSGS.unhappy):G.clean===mn?rnd(MSGS.dirty):rnd(MSGS.tired));}
        updateBars();drawHearts();updateInfo();
      }
    }
    idleTimer++;
    if(idleTimer>150&&!G.action){idleTimer=0;if(Math.random()<0.4)setMsg(G.petId==='shark'?rnd(MSGS.shark):G.petId==='mush'?rnd(MSGS.mush):rnd(MSGS.happy));}
  }
  if(G.started)drawScene();
  requestAnimationFrame(loop);
}
