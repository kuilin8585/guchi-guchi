// bandPets: array of 4 {petId,petName} entries (all hell ghosts)
let concertState=null;
let concertRaf=null;

function drawConcert(cs){
  const ctx=cs.cx, f=cs.frame, band=cs.band;
  const W=240,H=160;

  // ── BACKGROUND: dark arena ──────────────────────────────────────────
  ctx.fillStyle='#050306';ctx.fillRect(0,0,W,H);

  // Back wall with brick texture
  for(let by=0;by<60;by+=8){
    for(let bx=0;bx<W;bx+=16){
      const off=(Math.floor(by/8)%2)*8;
      ctx.fillStyle=by<32?'#1a0808':'#120606';
      ctx.fillRect(bx+off,by,15,7);
      ctx.fillStyle='#0a0404';
      ctx.fillRect(bx+off+15,by,1,7);ctx.fillRect(bx+off,by+7,16,1);
    }
  }

  // Stage platform
  ctx.fillStyle='#3a1808';ctx.fillRect(0,100,W,60);
  ctx.fillStyle='#502010';ctx.fillRect(0,100,W,4);
  ctx.fillStyle='#281006';ctx.fillRect(0,104,W,4);
  // Stage edge highlight
  ctx.fillStyle='#703020';ctx.fillRect(0,100,W,2);
  // Stage floor boards
  ctx.fillStyle='#2e1406';
  for(let bx=0;bx<W;bx+=20){ctx.fillRect(bx+19,104,1,56);}

  // ── SPOTLIGHTS ──────────────────────────────────────────────────────
  const spotCols=['#ff2020','#ff8000','#ffff00','#00ff80','#0080ff','#ff00ff'];
  const spotBeam=Math.floor(f/8)%spotCols.length;
  // 4 moving spotlights
  const spotXs=[40,80,120,170,210];
  spotXs.forEach((sx,i)=>{
    const col=spotCols[(spotBeam+i)%spotCols.length];
    const sway=Math.sin(f*0.04+i*1.2)*18;
    ctx.globalAlpha=0.08+Math.sin(f*0.05+i)*0.04;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx-20+sway,H);ctx.lineTo(sx+20+sway,H);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // Spot circle on stage
    ctx.globalAlpha=0.25+Math.sin(f*0.07+i)*0.1;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.ellipse(sx+sway,115,14,5,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  // ── DISCO BALL ────────────────────────────────────────────────────────
  const dbx=120,dby=12;
  ctx.fillStyle='#888888';ctx.beginPath();ctx.arc(dbx,dby,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#aaaaaa';ctx.beginPath();ctx.arc(dbx,dby,8,0,Math.PI*2);ctx.fill();
  // spinning mirror tiles
  const tilePhase=Math.floor(f/3)%8;
  for(let ti=0;ti<8;ti++){
    const a=(ti/8)*Math.PI*2+f*0.05;
    const tx=Math.round(dbx+Math.cos(a)*7), ty=Math.round(dby+Math.sin(a)*5);
    ctx.fillStyle=ti===tilePhase?'#ffffff':'#cccccc';
    ctx.fillRect(tx-1,ty-1,2,2);
  }
  // Disco ball string
  ctx.fillStyle='#888888';ctx.fillRect(dbx,0,1,4);
  // Light flares from disco ball
  const flare=Math.floor(f/4)%12;
  const flareAngle=(flare/12)*Math.PI*2;
  const fx2=Math.round(dbx+Math.cos(flareAngle)*50);
  const fy2=Math.round(Math.abs(Math.sin(flareAngle))*80+20);
  ctx.globalAlpha=0.7;ctx.fillStyle=spotCols[flare%spotCols.length];
  ctx.beginPath();ctx.arc(fx2,fy2,3,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // ── SPEAKER STACKS ────────────────────────────────────────────────────
  function drawSpeaker(x,y){
    ctx.fillStyle='#1a1008';ctx.fillRect(x,y,22,50);
    ctx.fillStyle='#0a0806';ctx.fillRect(x+1,y+1,20,48);
    // speaker cones
    [8,22,36].forEach(sy=>{
      ctx.fillStyle='#282010';ctx.fillRect(x+3,y+sy,16,10);
      ctx.fillStyle='#404030';ctx.beginPath();ctx.arc(x+11,y+sy+5,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#202018';ctx.beginPath();ctx.arc(x+11,y+sy+5,2,0,Math.PI*2);ctx.fill();
      // speaker shake on beat
      if(f%16<8){ctx.fillStyle='#484038';ctx.fillRect(x+3,y+sy+4,16,2);}
    });
    // Brand label
    ctx.fillStyle='#c04020';ctx.fillRect(x+5,y+48,12,4);
  }
  drawSpeaker(0,50);drawSpeaker(218,50);
  // Small monitor speakers on stage floor
  ctx.fillStyle='#201008';ctx.fillRect(30,93,18,9);ctx.fillRect(192,93,18,9);
  ctx.fillStyle='#303020';ctx.beginPath();ctx.arc(39,97,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(201,97,3,0,Math.PI*2);ctx.fill();

  // ── GUITAR AMPS ────────────────────────────────────────────────────────
  ctx.fillStyle='#1a0a04';ctx.fillRect(24,80,20,22);
  ctx.fillStyle='#281008';ctx.fillRect(25,81,18,20);
  ctx.fillStyle='#343020';ctx.beginPath();ctx.arc(34,91,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#181008';ctx.beginPath();ctx.arc(34,91,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c04020';ctx.fillRect(28,96,8,3);
  ctx.fillStyle='#1a0a04';ctx.fillRect(196,80,20,22);
  ctx.fillStyle='#281008';ctx.fillRect(197,81,18,20);
  ctx.fillStyle='#343020';ctx.beginPath();ctx.arc(206,91,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#181008';ctx.beginPath();ctx.arc(206,91,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c04020';ctx.fillRect(200,96,8,3);

  // ── DRUM KIT (stage right, behind drummer) ────────────────────────────────
  const dkx=192,dky=80;
  // Bass drum
  ctx.fillStyle='#201008';ctx.beginPath();ctx.ellipse(dkx,dky+14,18,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#301810';ctx.beginPath();ctx.ellipse(dkx,dky+14,16,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c04020';ctx.beginPath();ctx.ellipse(dkx,dky+14,8,6,0,0,Math.PI*2);ctx.fill();
  // hi-hat
  ctx.fillStyle='#888850';ctx.fillRect(dkx-28,dky,20,2);ctx.fillRect(dkx-28,dky+3,20,1);
  ctx.fillStyle='#706840';ctx.fillRect(dkx-24,dky-10,1,12);
  // snare
  ctx.fillStyle='#707060';ctx.beginPath();ctx.ellipse(dkx-16,dky+8,9,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#888870';ctx.beginPath();ctx.ellipse(dkx-16,dky+8,7,3,0,0,Math.PI*2);ctx.fill();
  // crash cymbal
  ctx.fillStyle='#c0a830';ctx.beginPath();ctx.ellipse(dkx+22,dky-4,11,4,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a08820';ctx.beginPath();ctx.ellipse(dkx+22,dky-4,9,3,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c0a830';ctx.fillRect(dkx+21,dky-14,1,12);
  // ride cymbal
  ctx.fillStyle='#b09020';ctx.beginPath();ctx.ellipse(dkx+8,dky-8,9,3,-0.2,0,Math.PI*2);ctx.fill();
  // floor tom
  ctx.fillStyle='#201008';ctx.beginPath();ctx.ellipse(dkx+18,dky+8,9,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#301810';ctx.beginPath();ctx.ellipse(dkx+18,dky+8,7,4,0,0,Math.PI*2);ctx.fill();
  // drum stool
  ctx.fillStyle='#181008';ctx.fillRect(dkx-4,dky+20,8,8);
  ctx.fillStyle='#2a1810';ctx.fillRect(dkx-6,dky+20,12,3);

  // ── MICROPHONE STAND (centre-left, in front of vocalist) ─────────────────
  const mcx=138,mcy=92;
  ctx.fillStyle='#606060';ctx.fillRect(mcx,mcy,1,14);
  ctx.fillStyle='#808080';ctx.fillRect(mcx-4,mcy+14,9,2);ctx.fillRect(mcx-6,mcy+16,13,2);
  ctx.fillStyle='#606060';ctx.beginPath();ctx.arc(mcx,mcy,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#888888';ctx.beginPath();ctx.arc(mcx,mcy,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#aaaaaa';ctx.beginPath();ctx.arc(mcx,mcy,1,0,Math.PI*2);ctx.fill();
  // mic cable
  ctx.strokeStyle='#303030';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(mcx+1,mcy+4);
  ctx.quadraticCurveTo(mcx+10,mcy+14,mcx+6,mcy+18);ctx.stroke();

  // ── BAND MEMBERS ─────────────────────────────────────────────────────────
  // Spread evenly across 240px stage with ~50px gaps between ghost centres.
  // guitar(38) · bass(86) · vocals(138) · drums(192)
  // Each ghost body is ~18px wide; instruments extend ~20px to the right,
  // so there is a comfortable 12-14px clear gap between each member.
  const ROLES=['guitar','bass','vocals','drums'];
  const POSITIONS=[
    {x:38,  y:108},  // lead guitar
    {x:86,  y:110},  // bass
    {x:138, y:106},  // vocals — at mic stand (mcx=138)
    {x:dkx, y:dky+16}, // drums — behind kit (dkx=192)
  ];

  POSITIONS.forEach((pos,i)=>{
    const member=band[i]||band[0];
    const pid=member.petId;
    const col=neonBodyCol(pid,member.petName||'');
    drawConcertGhost(ctx,pos.x,pos.y,pid,col,f,ROLES[i],i,member);
  });

  // ── AUDIENCE ─────────────────────────────────────────────────────────
  drawAudience(ctx,f);

  // ── MUSIC NOTES / EFFECTS ───────────────────────────────────────────
  const noteF=Math.floor(f/12)%6;
  const noteCols=['#ff4080','#ff8000','#ffff00','#00ff80','#00a8ff','#c040ff'];
  const notePositions=[
    {x:38,y:80},{x:60,y:74},{x:86,y:78},{x:112,y:72},{x:138,y:76},{x:170,y:70}
  ];
  notePositions.forEach((np,i)=>{
    if(i===noteF||i===(noteF+3)%6){
      const ny=np.y-((f+i*20)%28);
      ctx.fillStyle=noteCols[i];ctx.font='bold 9px monospace';
      ctx.fillText(['♪','♫','♩','♬','♭','♮'][i],np.x,ny);
    }
  });

  // ── BAND NAME BANNER ─────────────────────────────────────────────────
  const bannerY=6;
  ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(36,bannerY-2,168,16);
  ctx.fillStyle='#c04020';ctx.fillRect(36,bannerY-2,168,2);ctx.fillRect(36,bannerY+14,168,2);
  // Animated band name
  const bandNames=['THE HELL GHOSTS','★ HARD ROCK ★','RAGE FROM BEYOND'];
  const bn=bandNames[Math.floor(f/120)%bandNames.length];
  ctx.fillStyle=Math.floor(f/8)%2===0?'#ff4020':'#ff8040';
  ctx.font='bold 8px "Press Start 2P",monospace';
  ctx.textAlign='center';ctx.fillText(bn,120,bannerY+12);ctx.textAlign='left';

  // ── CROWD ENERGY BAR ─────────────────────────────────────────────────
  const energy=Math.min(1,(f%240)/240);
  ctx.fillStyle='#1a0a04';ctx.fillRect(4,H-10,80,5);
  const ecol=energy>0.8?'#ff4020':energy>0.5?'#ff8020':'#c04020';
  ctx.fillStyle=ecol;ctx.fillRect(4,H-10,Math.round(80*energy),5);
  ctx.fillStyle='#909090';ctx.font='5px "Press Start 2P",monospace';ctx.fillText('ENERGY',4,H-2);

  // Beat flash on kick hits (every 16 frames)
  if(f%16<3){
    ctx.globalAlpha=0.06;ctx.fillStyle='#ff2000';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }

  // ── CLOSE BUTTON (after 4 seconds / 240 frames) ──────────────────────
  if(f>240){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W-60,H-20,58,18);
    ctx.fillStyle='#c8a050';
    ctx.font='bold 6px "Press Start 2P",monospace';
    ctx.textAlign='center';ctx.fillText('TAP TO CLOSE',W-31,H-8);ctx.textAlign='left';
  }
}

function drawConcertGhost(ctx,cx,cy,pid,col,f,role,idx,bandMember){
  const glowCol=neonGlowCol(pid, bandMember?bandMember.petName:'');
  const bob=Math.floor((f+idx*13)/16)%2?-1:1;
  const cy2=cy+bob;
  const wave=Math.floor((f+idx*7)/10)%3;

  // ── GHOST BODY ──────────────────────────────────────────────────────────
  // Main sheet
  ctx.fillStyle=col;
  ctx.fillRect(cx-7,cy2-15,15,17);
  ctx.fillRect(cx-9,cy2-9,19,11);
  // Rounded top dome
  ctx.fillRect(cx-6,cy2-19,13,6);
  ctx.fillRect(cx-5,cy2-21,11,4);
  ctx.fillRect(cx-3,cy2-22,7,2);
  // Wiggly bottom tendrils (3 lobes, animated)
  ctx.fillRect(cx-9,cy2+2,5,4);
  ctx.fillRect(cx-3,cy2+3,5,3);
  ctx.fillRect(cx+3,cy2+2,5,4);
  if(wave===1){ctx.fillRect(cx-9,cy2+5,3,2);ctx.fillRect(cx+5,cy2+5,3,2);}
  if(wave===2){ctx.fillRect(cx-3,cy2+5,5,2);}

  // Neon glow halo (kept tight to body — cx-10 to cx+10)
  ctx.globalAlpha=0.13+Math.sin(f*0.08+idx)*0.06;
  ctx.fillStyle=glowCol;
  ctx.fillRect(cx-10,cy2-22,20,32);
  ctx.globalAlpha=1;

  // ── PET-SPECIFIC EARS / FEATURES ────────────────────────────────────────
  if(pid==='shark'){
    // Dorsal fin ghost — translucent icy blue
    ctx.fillStyle='#b0d8ff';
    ctx.fillRect(cx-2,cy2-28,5,10);
    ctx.fillRect(cx-1,cy2-26,3,8);
    ctx.fillRect(cx,cy2-24,2,6);
    ctx.globalAlpha=0.4;ctx.fillStyle=glowCol;
    ctx.fillRect(cx-3,cy2-27,7,9);
    ctx.globalAlpha=1;
    // Ghost fin tip
    ctx.fillStyle='#d0eeff';ctx.fillRect(cx,cy2-28,1,4);
  } else if(pid==='rabbit'){
    // Long tall ears floating upward
    ctx.fillStyle=col;
    ctx.fillRect(cx-7,cy2-32,4,16);
    ctx.fillRect(cx+3,cy2-32,4,16);
    // Inner ear glow
    ctx.fillStyle=glowCol;
    ctx.fillRect(cx-6,cy2-31,2,13);
    ctx.fillRect(cx+4,cy2-31,2,13);
    // Ear tips shimmer
    ctx.globalAlpha=0.6;ctx.fillStyle='#ffffff';
    ctx.fillRect(cx-7,cy2-33,4,2);ctx.fillRect(cx+3,cy2-33,4,2);
    ctx.globalAlpha=1;
  } else if(pid==='kockas'){
    // Tall checkered ears
    ctx.fillStyle=col;
    ctx.fillRect(cx-7,cy2-30,4,13);
    ctx.fillRect(cx+3,cy2-30,4,13);
    // Checkered pattern on ears (semi-transparent)
    const chk=['#f0f0f0','#222222'];
    ctx.globalAlpha=0.55;
    for(let r=0;r<8;r++){
      ctx.fillStyle=chk[r%2];ctx.fillRect(cx-7,cy2-30+r,2,1);
      ctx.fillStyle=chk[(r+1)%2];ctx.fillRect(cx-5,cy2-30+r,2,1);
      ctx.fillStyle=chk[r%2];ctx.fillRect(cx+3,cy2-30+r,2,1);
      ctx.fillStyle=chk[(r+1)%2];ctx.fillRect(cx+5,cy2-30+r,2,1);
    }
    ctx.globalAlpha=1;
  } else if(pid==='rilak'){
    // Round fluffy ears
    ctx.fillStyle=col;
    ctx.fillRect(cx-9,cy2-22,6,6);
    ctx.fillRect(cx+3,cy2-22,6,6);
    ctx.fillStyle=glowCol;
    ctx.fillRect(cx-8,cy2-21,4,4);
    ctx.fillRect(cx+4,cy2-21,4,4);
    // Ear inner dark spots
    ctx.fillStyle=col;
    ctx.fillRect(cx-7,cy2-20,2,2);ctx.fillRect(cx+5,cy2-20,2,2);
  } else if(pid==='mush'){
    // Glitchy flickering chaos ears
    const gc3=['#f870f8','#70f8f8','#f8f870','#ff4040'];
    const c1=gc3[Math.floor(f/5)%gc3.length];
    const c2=gc3[(Math.floor(f/5)+1)%gc3.length];
    ctx.globalAlpha=0.7+Math.sin(f*0.4)*0.3;
    ctx.fillStyle=c1;ctx.fillRect(cx-9,cy2-22,5,5);
    ctx.fillStyle=c2;ctx.fillRect(cx+4,cy2-22,5,5);
    // Extra glitch pixel bursts
    ctx.fillStyle=c1;ctx.fillRect(cx-10,cy2-24,2,2);
    ctx.fillStyle=c2;ctx.fillRect(cx+8,cy2-23,2,2);
    ctx.globalAlpha=1;
  } else {
    // Bear (default) — round ears
    ctx.fillStyle=col;
    ctx.fillRect(cx-8,cy2-22,5,5);
    ctx.fillRect(cx+3,cy2-22,5,5);
    ctx.fillStyle=glowCol;
    ctx.fillRect(cx-7,cy2-21,4,4);
    ctx.fillRect(cx+3,cy2-21,4,4);
  }

  // ── ANGRY GLOWING EYES ──────────────────────────────────────────────────
  ctx.fillStyle=glowCol;
  ctx.fillRect(cx-5,cy2-14,3,3);
  ctx.fillRect(cx+2,cy2-14,3,3);
  // Red pupils
  ctx.fillStyle='#ff1000';
  ctx.fillRect(cx-4,cy2-13,2,2);
  ctx.fillRect(cx+3,cy2-13,2,2);
  // Eye shine
  ctx.fillStyle='#ffffff';
  ctx.fillRect(cx-4,cy2-14,1,1);
  ctx.fillRect(cx+3,cy2-14,1,1);
  // Angry V-brow (animates)
  const browShift=Math.floor(f/10)%2;
  ctx.fillStyle='#ff5000';
  ctx.fillRect(cx-6,cy2-17+browShift,4,2);
  ctx.fillRect(cx+2,cy2-17,4,2);
  // Snarl mouth
  const snarl=Math.floor(f/8)%4;
  ctx.fillStyle='#000000';
  ctx.fillRect(cx-4,cy2-9,9,2);
  if(snarl<2){
    // teeth showing
    ctx.fillStyle='#ffffff';
    ctx.fillRect(cx-3,cy2-9,2,2);ctx.fillRect(cx-1,cy2-9,2,2);
    ctx.fillRect(cx+1,cy2-9,2,2);ctx.fillRect(cx+3,cy2-9,2,2);
  }

  // ── INSTRUMENTS ─────────────────────────────────────────────────────────
  if(role==='guitar'){
    const strum=Math.floor((f+idx*17)/5)%6;
    const armSwing=strum<3?-2:2;
    // Guitar body — Les Paul shape
    ctx.fillStyle='#901808';
    ctx.fillRect(cx+5,cy2-10,11,9);
    ctx.fillRect(cx+6,cy2-13,9,5);
    ctx.fillRect(cx+6,cy2-1,9,4);
    ctx.fillRect(cx+5,cy2-14,4,3); // upper bout
    ctx.fillRect(cx+5,cy2,4,3);   // lower bout curve
    // Sunburst detail
    ctx.fillStyle='#c03010';
    ctx.fillRect(cx+7,cy2-12,6,2);
    ctx.fillRect(cx+7,cy2-3,6,2);
    // Binding stripe
    ctx.fillStyle='#f0c870';
    ctx.fillRect(cx+5,cy2-14,1,17);ctx.fillRect(cx+15,cy2-13,1,15);
    // Pickups
    ctx.fillStyle='#1a1008';
    ctx.fillRect(cx+7,cy2-9,6,2);ctx.fillRect(cx+7,cy2-6,6,2);
    // Guitar neck going up-left
    ctx.fillStyle='#704010';
    ctx.fillRect(cx-4,cy2-18,5,16);
    // Fret markers
    ctx.fillStyle='#f0e8d0';
    [cy2-16,cy2-13,cy2-10,cy2-7].forEach(fy=>ctx.fillRect(cx-2,fy,2,1));
    // Strings (6 strings)
    ctx.fillStyle='#d0d0d0';
    for(let s=0;s<4;s++) ctx.fillRect(cx-3+s,cy2-18,1,14);
    ctx.fillStyle='#e8e8e8';
    for(let s=0;s<2;s++) ctx.fillRect(cx+s,cy2-18,1,14);
    // Headstock
    ctx.fillStyle='#704010';ctx.fillRect(cx-6,cy2-22,5,5);
    ctx.fillStyle='#c8a030';
    [cy2-22,cy2-20].forEach(ty=>{ctx.fillRect(cx-6,ty,2,1);ctx.fillRect(cx-3,ty,2,1);});
    // Strumming arm
    ctx.fillStyle=col;
    ctx.fillRect(cx+3,cy2-8+armSwing,6,3);
    // Pick flash
    if(strum===2||strum===5){
      ctx.fillStyle='#ffe040';
      ctx.fillRect(cx+8,cy2-6+armSwing,3,3);
      // pick spark
      ctx.globalAlpha=0.8;ctx.fillStyle='#ffffff';
      ctx.fillRect(cx+10,cy2-8+armSwing,2,2);
      ctx.globalAlpha=1;
    }
    // Power chord energy wave on big strum (contained within ~cx+24)
    if(strum===0){
      ctx.globalAlpha=0.3;ctx.fillStyle=glowCol;
      ctx.fillRect(cx+12,cy2-12,6,10);ctx.fillRect(cx+17,cy2-14,5,14);
      ctx.globalAlpha=1;
    }

  } else if(role==='bass'){
    const pluck=Math.floor((f+idx*23)/7)%5;
    // Bass body — Fender Precision shape (bigger, rounder)
    ctx.fillStyle='#1a4888';
    ctx.fillRect(cx+5,cy2-11,12,10);
    ctx.fillRect(cx+6,cy2-14,10,5);
    ctx.fillRect(cx+6,cy2-1,10,5);
    ctx.fillRect(cx+4,cy2-13,4,4); // cutaway
    // Sunburst gradient effect
    ctx.fillStyle='#2860a8';
    ctx.fillRect(cx+8,cy2-12,7,2);ctx.fillRect(cx+8,cy2-4,7,2);
    // Binding
    ctx.fillStyle='#ffffff';
    ctx.fillRect(cx+5,cy2-14,1,18);ctx.fillRect(cx+16,cy2-13,1,16);
    // Pickguard
    ctx.fillStyle='#0a0a0a';ctx.fillRect(cx+6,cy2-10,8,7);
    // Pickup (single coil)
    ctx.fillStyle='#404040';ctx.fillRect(cx+7,cy2-8,6,3);
    // Bass neck (longer, thicker)
    ctx.fillStyle='#603808';
    ctx.fillRect(cx-6,cy2-20,6,18);
    // Frets
    ctx.fillStyle='#e0e0d0';
    [cy2-19,cy2-16,cy2-13,cy2-10,cy2-7].forEach(fy=>ctx.fillRect(cx-6,fy,6,1));
    // 4 fat strings
    ctx.fillStyle='#c0a820';
    for(let s=0;s<4;s++) ctx.fillRect(cx-5+s,cy2-20,1,16);
    // Headstock
    ctx.fillStyle='#603808';ctx.fillRect(cx-8,cy2-24,6,6);
    ctx.fillStyle='#b08020';
    [cy2-24,cy2-21].forEach(ty=>{ctx.fillRect(cx-8,ty,2,1);ctx.fillRect(cx-5,ty,2,1);});
    // Plucking fingers (two fingers alternating)
    ctx.fillStyle=col;
    const fingerUp=pluck<2?-2:1;
    ctx.fillRect(cx+4,cy2-7+fingerUp,4,2);
    ctx.fillRect(cx+4,cy2-4-(pluck%2),4,2);
    // String vibration (contained within ~cx+22)
    if(pluck===0||pluck===2){
      ctx.globalAlpha=0.5;ctx.fillStyle=glowCol;
      ctx.fillRect(cx+17,cy2-10,6,8);ctx.fillRect(cx+21,cy2-12,4,12);
      ctx.globalAlpha=1;
    }

  } else if(role==='vocals'){
    // Microphone — large handheld
    ctx.fillStyle='#707070';ctx.fillRect(cx+5,cy2-14,4,12);
    ctx.fillStyle='#909090';ctx.fillRect(cx+6,cy2-15,2,2);
    // Mic head (grille ball)
    ctx.fillStyle='#606060';
    ctx.beginPath();ctx.arc(cx+7,cy2-17,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#909090';
    ctx.beginPath();ctx.arc(cx+7,cy2-17,4,0,Math.PI*2);ctx.fill();
    // Grille dots
    ctx.fillStyle='#484848';
    for(let gx2=-2;gx2<=2;gx2++) for(let gy2=-2;gy2<=2;gy2++){
      if(gx2*gx2+gy2*gy2<=5) ctx.fillRect(cx+7+gx2,cy2-17+gy2,1,1);
    }
    // Holding arm
    ctx.fillStyle=col;ctx.fillRect(cx+3,cy2-10,5,3);
    // Mouth wide open on beat — animates in sync
    const beat=Math.floor(f/7)%4;
    const mh=beat===0?4:beat===1?5:beat===2?3:4;
    ctx.fillStyle='#cc1030';ctx.fillRect(cx-5,cy2-8,10,mh);
    // Teeth top row
    ctx.fillStyle='#ffffff';ctx.fillRect(cx-4,cy2-8,8,2);
    // Uvula
    if(beat>1){ctx.fillStyle='#aa1040';ctx.fillRect(cx,cy2-7,2,2);}
    // Vocal ripple waves going left
    if(beat===0||beat===2){
      ctx.globalAlpha=0.5;
      [8,14,20].forEach((d,i)=>{
        ctx.fillStyle=glowCol;
        ctx.fillRect(cx-5-d,cy2-9+i,d,1);
      });
      ctx.globalAlpha=1;
    }
    // Free arm raised overhead, pumping fist
    const pump=Math.floor(f/9)%3;
    ctx.fillStyle=col;
    ctx.fillRect(cx-11,cy2-14-pump,5,3);
    ctx.fillRect(cx-13,cy2-17-pump,4,4); // fist

  } else if(role==='drums'){
    // Drumsticks — offset timing for left/right
    const hitL=Math.floor((f+idx*3)/4)%8;
    const hitR=Math.floor((f+idx*3+4)/4)%8;
    // Left stick
    ctx.fillStyle='#c8a060';
    const lyOff=hitL<4?-4:3;
    ctx.fillRect(cx-12,cy2-14+lyOff,2,11);
    ctx.fillRect(cx-11,cy2-14+lyOff,1,2); // tip
    // Right stick  
    ctx.fillStyle='#c8a060';
    const ryOff=hitR<4?3:-4;
    ctx.fillRect(cx+9,cy2-12+ryOff,2,11);
    ctx.fillRect(cx+9,cy2-13+ryOff,1,2);
    // Snare hit flash (left)
    if(hitL===3){
      ctx.globalAlpha=0.9;ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(cx-11,cy2-3,4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    // Cymbal hit flash (right)
    if(hitR===3){
      ctx.globalAlpha=0.9;ctx.fillStyle='#f8e040';
      ctx.beginPath();ctx.arc(cx+24,cy2-20,6,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    // Kick drum pedal pump
    const kick=Math.floor(f/8)%4;
    if(kick===0||kick===1){
      ctx.fillStyle=col;ctx.fillRect(cx-4,cy2+4,5,3); // foot down
    }
  }

  // ── NAME TAG ───────────────────────────────────────────────────────────
  if(bandMember){
    ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(cx-12,cy2+8,24,9);
    ctx.fillStyle=glowCol;
    ctx.font='bold 6px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillText(bandMember.petName.slice(0,5).toUpperCase(),cx,cy2+16);
    ctx.textAlign='left';
  }
}

function drawAudience(ctx,f){
  // Crowd of tiny bobbing silhouettes at the bottom
  const crowdY=140;
  const bobCols=['#1a0808','#200a0a','#180606'];
  const handCols=['#ff2020','#ff8020','#ffff20','#20ff80','#2080ff','#ff20ff'];
  for(let i=0;i<28;i++){
    const bx=4+i*8+(i%3)*2;
    const bob=Math.floor((f+i*7)/12)%2?-2:0;
    const col=bobCols[i%3];
    // Body
    ctx.fillStyle=col;ctx.fillRect(bx,crowdY+bob,5,14);
    // Head
    ctx.fillRect(bx+1,crowdY-5+bob,3,5);
    // Raised hand (some)
    if(i%3!==1){
      const handBob=Math.floor((f*1.5+i*5)/10)%3;
      ctx.fillStyle=handCols[Math.floor((f/20+i)%handCols.length)];
      ctx.fillRect(bx+i%2===0?-1:5, crowdY-8+bob-handBob,2,4);
    }
    // Glow from phone lights
    if(i%4===0){
      ctx.globalAlpha=0.4+Math.sin(f*0.1+i)*0.2;
      ctx.fillStyle='#ffffff';ctx.fillRect(bx+2,crowdY-2+bob,1,2);
      ctx.globalAlpha=1;
    }
  }
}

function buildPreview(pet){
  const c=document.createElement('canvas');c.width=18;c.height=18;
  const ctx=c.getContext('2d');ctx.imageSmoothingEnabled=false;
  if(pet.id==='mush'){const cols=['#b870c8','#7840b8','#40a8c8','#c84040','#40c880'];for(let y=0;y<18;y++)for(let x=0;x<18;x++)if(Math.random()<0.4){ctx.fillStyle=cols[Math.floor(Math.random()*cols.length)];ctx.fillRect(x,y,1,1);}ctx.fillStyle='#481868';ctx.fillRect(4,6,10,9);ctx.fillStyle='#b870c8';ctx.fillRect(5,7,8,7);ctx.fillStyle='#281040';ctx.fillRect(6,9,2,2);ctx.fillRect(10,9,2,2);ctx.fillStyle='#c03890';ctx.fillRect(8,12,2,1);ctx.fillStyle='#7840b8';ctx.fillRect(3,3,3,3);ctx.fillRect(12,3,3,3);return c;}
  if(pet.id==='shark'){ctx.fillStyle='#1a3870';ctx.fillRect(7,2,4,6);ctx.fillRect(8,1,2,1);ctx.fillStyle='#2858a8';ctx.fillRect(8,3,2,4);ctx.fillStyle='#1a3870';ctx.fillRect(3,7,12,9);ctx.fillStyle='#4878b8';ctx.fillRect(4,8,10,7);ctx.fillStyle='#d8eeff';ctx.fillRect(5,11,8,3);ctx.fillStyle='#0a1830';ctx.fillRect(5,10,2,2);ctx.fillRect(11,10,2,2);ctx.fillStyle='#1a3870';ctx.fillRect(5,13,3,1);ctx.fillRect(10,13,3,1);for(let i=0;i<3;i++){ctx.fillStyle='#d8eeff';ctx.fillRect(6+i*2,13,1,1);}return c;}
  const ol=pet.outline||'#4a3a1e';
  if(pet.id==='kockas'){
    // Ear outlines
    ctx.fillStyle=pet.dark;ctx.fillRect(4,1,2,6);ctx.fillRect(12,1,2,6);
    // Checkered ear fill
    const chk=['#f0f0f0','#181818'];
    for(let row=0;row<4;row++){ctx.fillStyle=chk[row%2];ctx.fillRect(4,2+row,1,1);ctx.fillStyle=chk[(row+1)%2];ctx.fillRect(5,2+row,1,1);}
    for(let row=0;row<4;row++){ctx.fillStyle=chk[row%2];ctx.fillRect(12,2+row,1,1);ctx.fillStyle=chk[(row+1)%2];ctx.fillRect(13,2+row,1,1);}
  }
  else if(pet.id==='rabbit'){ctx.fillStyle=ol;ctx.fillRect(4,0,3,8);ctx.fillRect(11,0,3,8);ctx.fillStyle=pet.ear;ctx.fillRect(5,1,2,6);ctx.fillRect(11,1,2,6);}
  else if(pet.id==='rilak'){ctx.fillStyle=ol;ctx.fillRect(3,4,5,5);ctx.fillRect(10,4,5,5);ctx.fillStyle=pet.ear;ctx.fillRect(4,5,4,4);ctx.fillRect(10,5,4,4);ctx.fillStyle=pet.dark;ctx.fillRect(5,5,2,2);ctx.fillRect(11,5,2,2);}
  else{ctx.fillStyle=ol;ctx.fillRect(4,4,4,5);ctx.fillRect(10,4,4,5);ctx.fillStyle=pet.ear;ctx.fillRect(5,5,3,4);ctx.fillRect(10,5,3,4);}
  ctx.fillStyle=ol;ctx.fillRect(2,7,14,10);ctx.fillStyle=pet.body;ctx.fillRect(3,8,12,8);ctx.fillStyle=pet.belly;ctx.fillRect(5,11,8,4);ctx.fillStyle=pet.dark;ctx.fillRect(5,10,2,2);ctx.fillRect(11,10,2,2);ctx.fillStyle=pet.nose;ctx.fillRect(8,13,2,1);return c;
}

function sizeUI(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const isPortrait = vw < vh || vw <= 500;

  if(isPortrait){
    // ── PORTRAIT / MOBILE: screen on top, controls below ──────────────────
    // Reserve space for top bar buttons (~36px) and bottom safe area
    const topBar=40;
    const safeBottom=Math.max(0, parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab')||'0')||0);
    const availH=vh-topBar-safeBottom;

    // Controls take a fixed portion of height; screen gets the rest
    const ctrlH=Math.min(210, Math.round(availH*0.42));
    const screenAvailH=availH-ctrlH-8;
    const screenAvailW=vw-16;

    // Screen aspect 72:55
    let sw=Math.min(screenAvailW, Math.round(screenAvailH*(72/55)));
    let sh=Math.round(sw*(55/72));
    if(sh>screenAvailH){sh=screenAvailH;sw=Math.round(sh*(72/55));}
    sw=Math.max(140,sw);sh=Math.max(108,sh);

    const wrap=document.getElementById('screenWrap');
    const canvas=document.getElementById('gc');
    if(wrap&&canvas){
      wrap.style.width=sw+'px';wrap.style.height=sh+'px';
      canvas.style.width=sw+'px';canvas.style.height=sh+'px';
    }

    const ctrlW=Math.min(vw-8, 420);
    const ctrl=document.getElementById('ctrlPanel');
    if(ctrl) ctrl.style.width=ctrlW+'px';

    const msgEl=document.getElementById('msg');
    if(msgEl) msgEl.style.fontSize=Math.max(5,Math.round(sh*0.062))+'px';
    const label=document.getElementById('screenLabel');
    if(label) label.style.fontSize=Math.max(5,Math.round(sw*0.022))+'px';

    // Proportional sizing based on control width
    const icSz=Math.max(12,Math.round(ctrlW/14));
    document.querySelectorAll('.ico canvas').forEach(c=>{c.style.width=icSz+'px';c.style.height=icSz+'px';});
    document.querySelectorAll('.ico span').forEach(s=>{s.style.fontSize=Math.max(5,Math.round(ctrlW*0.038))+'px';});

    const hSz=Math.max(12,Math.round(ctrlW*0.07));
    document.querySelectorAll('.hearts canvas').forEach(c=>{c.style.width=hSz+'px';c.style.height=hSz+'px';});

    const barH=Math.max(5,Math.round(ctrlH*0.025));
    document.querySelectorAll('.st').forEach(el=>el.style.height=barH+'px');
    document.querySelectorAll('.evo-fill').forEach(el=>el.style.height=barH+'px');

    const textSz=Math.max(5,Math.round(ctrlW*0.038));
    document.querySelectorAll('.sn,.info-row,.evo-lbl').forEach(el=>el.style.fontSize=textSz+'px');

    const selH=Math.max(32,Math.round(ctrlH*0.14));
    document.querySelectorAll('.sel').forEach(el=>el.style.height=selH+'px');

    const btnSz=Math.max(40,Math.round(ctrlH*0.22));
    const btnSzSm=Math.max(32,Math.round(ctrlH*0.17));
    document.querySelectorAll('.tb').forEach(el=>{
      const sm=el.classList.contains('sm');
      const sz=sm?btnSzSm:btnSz;
      el.style.width=sz+'px';el.style.height=sz+'px';
      el.style.fontSize=Math.max(5,Math.round(sz*0.22))+'px';
    });

    // Update setup text sizing for mobile
    const stSz=Math.min(14,Math.round(vw*0.032));
    const st=document.querySelector('.setup-title');if(st)st.style.fontSize=stSz+'px';
    const ss=document.querySelector('.setup-sub');if(ss)ss.style.fontSize=Math.round(stSz*0.72)+'px';
    const sh2=document.querySelector('.hint');if(sh2)sh2.style.fontSize=Math.round(stSz*0.6)+'px';
    const nl=document.querySelector('.name-lbl');if(nl)nl.style.fontSize=Math.round(stSz*0.72)+'px';
    const ni=document.querySelector('.name-inp');if(ni)ni.style.fontSize=Math.max(16,Math.round(stSz*0.9))+'px';
    const sb2=document.querySelector('.start-btn');if(sb2)sb2.style.fontSize=Math.round(stSz*0.85)+'px';

  } else {
    // ── LANDSCAPE / DESKTOP: side by side ─────────────────────────────────
    const gap=Math.min(40,Math.round(vw*0.02));
    const ctrlW=Math.min(220,Math.round(vw*0.28));
    const screenAvailW=vw-ctrlW-gap-40;
    const screenAvailH=vh-60;

    let sw=Math.min(screenAvailW,Math.round(screenAvailH*(72/55)));
    let sh=Math.round(sw*(55/72));
    if(sh>screenAvailH){sh=screenAvailH;sw=Math.round(sh*(72/55));}
    sw=Math.max(180,sw);sh=Math.max(138,sh);

    const wrap=document.getElementById('screenWrap');
    const canvas=document.getElementById('gc');
    if(wrap&&canvas){
      wrap.style.width=sw+'px';wrap.style.height=sh+'px';
      canvas.style.width=sw+'px';canvas.style.height=sh+'px';
    }
    const msgEl=document.getElementById('msg');
    if(msgEl) msgEl.style.fontSize=Math.max(5,Math.round(sh*0.065))+'px';
    const label=document.getElementById('screenLabel');
    if(label) label.style.fontSize=Math.max(5,Math.round(sw*0.025))+'px';
    const ctrl=document.getElementById('ctrlPanel');
    if(ctrl) ctrl.style.width=ctrlW+'px';

    const icSz=Math.max(10,Math.round(ctrlW*0.1));
    document.querySelectorAll('.ico canvas').forEach(c=>{c.style.width=icSz+'px';c.style.height=icSz+'px';});
    document.querySelectorAll('.ico span').forEach(s=>{s.style.fontSize=Math.max(4,Math.round(ctrlW*0.042))+'px';});

    const hSz=Math.max(10,Math.round(ctrlW*0.09));
    document.querySelectorAll('.hearts canvas').forEach(c=>{c.style.width=hSz+'px';c.style.height=hSz+'px';});

    const barH=Math.max(4,Math.round(ctrlW*0.04));
    document.querySelectorAll('.st').forEach(el=>el.style.height=barH+'px');
    document.querySelectorAll('.evo-fill').forEach(el=>el.style.height=barH+'px');

    const textSz=Math.max(4,Math.round(ctrlW*0.048));
    document.querySelectorAll('.sn,.info-row,.evo-lbl').forEach(el=>el.style.fontSize=textSz+'px');

    const selH=Math.max(8,Math.round(ctrlW*0.06));
    document.querySelectorAll('.sel').forEach(el=>el.style.height=selH+'px');

    const btnSz=Math.max(28,Math.round(ctrlW*0.2));
    const btnSzSm=Math.max(22,Math.round(ctrlW*0.15));
    document.querySelectorAll('.tb').forEach(el=>{
      const sm=el.classList.contains('sm');
      const sz=sm?btnSzSm:btnSz;
      el.style.width=sz+'px';el.style.height=sz+'px';
      el.style.fontSize=Math.max(4,Math.round(sz*0.22))+'px';
    });

    const stSz=Math.min(12,Math.round(vw*0.018));
    const st=document.querySelector('.setup-title');if(st)st.style.fontSize=stSz+'px';
    const ss=document.querySelector('.setup-sub');if(ss)ss.style.fontSize=Math.round(stSz*0.65)+'px';
    const sh2=document.querySelector('.hint');if(sh2)sh2.style.fontSize=Math.round(stSz*0.55)+'px';
    const nl=document.querySelector('.name-lbl');if(nl)nl.style.fontSize=Math.round(stSz*0.65)+'px';
    const ni=document.querySelector('.name-inp');if(ni)ni.style.fontSize=Math.round(stSz*0.8)+'px';
    const sb2=document.querySelector('.start-btn');if(sb2)sb2.style.fontSize=Math.round(stSz*0.8)+'px';
  }
}

function snapLiveState(){
  // Capture full live game state for storage in collection
  return {
    hunger:G.hunger, happy:G.happy, clean:G.clean, energy:G.energy,
    age:G.age, ticks:G.ticks, hearts:G.hearts, score:G.score, coins:G.coins,
    sick:G.sick, sickTimer:G.sickTimer, sleeping:G.sleeping,
    lifetimeHappy:G.lifetimeHappy, lifetimeTicks:G.lifetimeTicks,
    mushParts:G.mushParts,
  };
}

function collectPet(){
  if(!G.started) return;
  ensureAudio();SFX.collect();
  const isAlive = !G.afterlife;
  const entry={
    petId:G.petId,
    petName:G.petName,
    type: G.afterlife ? G.afterlife.type : 'alive',
    age: G.age,
    earlyDeath: G.afterlife ? !!G.afterlife.earlyDeath : false,
    liveState: isAlive ? snapLiveState() : null,
  };
  OWNER.collection.push(entry);
  const hellCount=OWNER.collection.filter(p=>p.type==='hell').length;
  if(hellCount>=4&&hellCount%4===0){
    // Show the concert prompt before resetting, so the player can choose
    // to trigger the rock concert now or save it for later.
    const hellPets=OWNER.collection.filter(p=>p.type==='hell').slice(-4);
    resetForNewPet();
    showConcertPrompt(hellPets);
  } else {
    resetForNewPet();
  }
}

// ── SWAP TO COLLECTED PET ─────────────────────────────────────────────────
// Called when the player taps PLAY on an alive card in the inventory.
// Saves the currently active pet (if any) back into the collection,
// then loads the chosen pet's live state and resumes gameplay.
function swapToPet(idx){
  const entry=OWNER.collection[idx];
  if(!entry||entry.type!=='alive'||!entry.liveState) return;
  ensureAudio();SFX.btn();
  closeInv();

  // If a pet is currently being played, snapshot it back into the collection.
  // It goes back as an alive entry at its own position (or appended if new).
  if(G.started&&G.petId&&!G.afterlife){
    // Check whether it's already in the collection (came from swapping)
    const existingIdx=OWNER.collection.findIndex(
      (e,i)=>i!==idx&&e.type==='alive'&&e.petId===G.petId&&e.petName===G.petName
    );
    const savedEntry={
      petId:G.petId, petName:G.petName, type:'alive',
      age:G.age, earlyDeath:false,
      liveState:snapLiveState(),
    };
    if(existingIdx!==-1){
      OWNER.collection[existingIdx]=savedEntry;
    } else {
      OWNER.collection.push(savedEntry);
    }
  }

  // Remove chosen entry from collection while it's being played
  OWNER.collection.splice(idx,1);

  // Restore its live state into G
  const pet=PETS.find(p=>p.id===entry.petId)||PETS[0];
  const ls=entry.liveState;
  G.petId=entry.petId; G.petName=entry.petName; G.pet=pet;
  G.hunger=ls.hunger;   G.happy=ls.happy;
  G.clean=ls.clean;     G.energy=ls.energy;
  G.age=ls.age;         G.ticks=ls.ticks;
  G.hearts=ls.hearts;   G.score=ls.score;   G.coins=ls.coins;
  G.sick=ls.sick;       G.sickTimer=ls.sickTimer;
  G.sleeping=ls.sleeping;
  G.lifetimeHappy=ls.lifetimeHappy; G.lifetimeTicks=ls.lifetimeTicks;
  G.mushParts=ls.mushParts||null;
  G.stage=getStage();
  G.afterlife=null; G.dead=false;
  G.frame=0; G.eyeOpen=true; G.particles=[];
  G.action=null; G.actionF=0; G.selIcon=0; G.feedAnim=null;
  G.playAnim=null; G.bathAnim=null; G.medAnim=null;
  G.started=true;

  // Show game UI
  document.getElementById('setupOverlay').style.display='none';
  document.getElementById('gameUI').style.display='flex';
  buildGameControls();
  gc=document.getElementById('gc'); gx=gc.getContext('2d'); gx.imageSmoothingEnabled=false;
  sizeUI();
  updateBars(); drawHearts(); updateIcons(); updateInfo();
  setMsg('Welcome back, '+G.petName+'! ♥');
  document.getElementById('screenLabel').textContent=G.petName;
  lastTick=Date.now();
  updateInvBtn();
  _currentBgmKey=null; updateBgm();
}

// ── CONCERT PROMPT ───────────────────────────────────────────────────────────
// Shown after the 4th (8th, 12th…) hell ghost is collected, and also via
// the 🎸 BAND button in the inventory. Lets the player trigger the concert
// now or dismiss and come back later.
function showConcertPrompt(hellPets){
  // Remove any existing prompt first
  const existing=document.getElementById('concertPrompt');
